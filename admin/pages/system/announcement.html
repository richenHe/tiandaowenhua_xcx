<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <title>公告管理</title>
  <link rel="stylesheet" href="../../assets/libs/tdesign.min.css">
  <link rel="stylesheet" href="../../assets/css/tokens.css?v=20260402">
  <style>
    .c {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 24px;
    }

    /* 云存储上传组件样式 */
    .upload-container {
      margin-bottom: 16px;
    }

    .upload-placeholder {
      width: 200px;
      height: 200px;
      border: 2px dashed #dcdcdc;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-placeholder:hover {
      border-color: #0052d9;
      background: #f3f3f3;
    }

    .upload-placeholder i {
      font-size: 32px;
      color: #999;
      margin-bottom: 8px;
    }

    .upload-placeholder p {
      margin: 0;
      color: #999;
      font-size: 14px;
    }

    .image-preview {
      position: relative;
      width: 200px;
    }

    .image-preview img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #dcdcdc;
    }

    .image-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .upload-tips {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="announcement-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content">
          <div class="c">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <h1 style="font-size:20px;font-weight:600;margin:0;">公告管理</h1>
              <t-button theme="success" @click="handleAdd">+ 发布公告</t-button>
            </div>
            
            <!-- 查询表单 -->
            <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;">
              <div style="width:200px;flex:0 0 200px;"><t-input v-model="keyword" placeholder="公告标题" clearable @enter="handleSearch" /></div>
              <t-button theme="primary" @click="handleSearch">查询</t-button>
              <t-button @click="resetSearch">重置</t-button>
            </div>
            
            <!-- 数据表格 -->
            <t-table 
              :data="dataList" 
              :columns="columns" 
              :loading="loading" 
              :pagination="pagination" 
              @page-change="handlePageChange" 
              row-key="id"
              bordered 
              stripe
            >
              <template #type="{row}">
                <t-tag v-if="row.category==='system'" theme="primary">系统</t-tag>
                <t-tag v-else-if="row.category==='activity'" theme="success">活动</t-tag>
                <t-tag v-else>通知</t-tag>
              </template>
              
              <template #isTop="{row}">
                <t-tag v-if="row.is_top===1" theme="warning">置顶</t-tag>
                <span v-else style="color:#bbb;">-</span>
              </template>

              <template #status="{row}">
                <t-tag v-if="row.status===1" theme="success">显示</t-tag>
                <t-tag v-else>隐藏</t-tag>
              </template>
              
              <template #op="{row}">
                <t-space>
                  <t-button size="small" variant="text" @click="handleEdit(row)">编辑</t-button>
                  <t-button size="small" variant="text" :theme="row.is_top === 1 ? 'default' : 'warning'" @click="handleToggleTop(row)">
                    {{ row.is_top === 1 ? '取消置顶' : '置顶' }}
                  </t-button>
                  <t-button size="small" variant="text" :theme="row.status === 1 ? 'warning' : 'success'" @click="handleToggleStatus(row)">
                    {{ row.status === 1 ? '隐藏' : '显示' }}
                  </t-button>
                  <t-button size="small" variant="text" theme="danger" @click="handleDelete(row)">删除</t-button>
                </t-space>
              </template>
            </t-table>
          </div>
          
          <!-- 新增/编辑弹窗 -->
          <t-dialog 
            v-model:visible="dialogVisible" 
            :header="dialogMode==='add'?'发布公告':'编辑公告'" 
            width="700px" 
            @confirm="handleSave"
            @close="handleDialogClose"
          >
            <t-form :data="formData" label-width="100px">
              <t-form-item label="公告标题" required>
                <t-input v-model="formData.title" placeholder="请输入公告标题"/>
              </t-form-item>
              
              <t-form-item label="公告类型" required>
                <t-select v-model="formData.category" :options="typeOptions"/>
              </t-form-item>
              
              <!-- 封面图片上传 -->
              <t-form-item label="封面图片">
                <cloud-image-upload
                  v-model="formData.coverImageURL"
                  v-model:file-id="formData.coverImage"
                  path-prefix="announcements/covers"
                  :item-id="formData.id || 'new'"
                  tips="建议尺寸：750×400，支持 JPG/PNG，不超过 5MB"
                  :width="320"
                  :height="160"
                />
              </t-form-item>
              
              <t-form-item label="跳转链接">
                <t-input v-model="formData.link" placeholder="选填，用于轮播图跳转"/>
              </t-form-item>
              
              <t-form-item label="公告内容" required>
                <t-textarea 
                  v-model="formData.content" 
                  :autosize="{minRows:8}"
                  placeholder="请输入公告内容"
                />
              </t-form-item>
              
              <t-form-item label="显示状态">
                <t-radio-group v-model="formData.status">
                  <t-radio :value="1">显示</t-radio>
                  <t-radio :value="0">隐藏</t-radio>
                </t-radio-group>
              </t-form-item>
            </t-form>
          </t-dialog>
        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <!-- 引入依赖 -->
  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  
  <!-- 🔥 引入云存储相关脚本（使用本地 SDK） -->
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <script src="../../assets/js/config.js?v=20260402"></script>
  <script src="../../assets/js/cloudbase.js?v=20260402"></script>
  <script src="../../assets/js/cloud-storage-helper.js?v=20260402"></script>
  
  <script src="../../assets/js/admin-api.js?v=20260402"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260402"></script>
  
  <script>
    const { createApp, ref, onMounted } = Vue;
    
    createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        
        // 数据状态
        const loading = ref(false);
        const dataList = ref([]);
        const dialogVisible = ref(false);
        const dialogMode = ref('add');
        const formData = ref({});
        const keyword = ref('');
        const pagination = ref({
          current: 1,
          pageSize: 20,
          total: 0
        });
        
        
        // 选项配置
        // announcements.category: general通用/course课程/activity活动/system系统/banner轮播图/announcement公告
        const typeOptions = [
          { label: '通用', value: 'general' },
          { label: '课程', value: 'course' },
          { label: '活动', value: 'activity' },
          { label: '系统', value: 'system' },
          { label: '轮播图', value: 'banner' },
          { label: '公告', value: 'announcement' }
        ];
        
        // 表格列配置
        const columns = [
          { colKey: 'title', title: '公告标题', width: 250 },
          { colKey: 'category', title: '类型', width: 100, cell: 'type' },
          { colKey: 'is_top', title: '置顶', width: 80, cell: 'isTop' },
          { colKey: 'created_at', title: '发布时间', width: 160 },
          { colKey: 'status', title: '状态', width: 100, cell: 'status' },
          { colKey: 'op', title: '操作', width: 200, cell: 'op' }
        ];
        
        // 加载数据
        const loadData = async () => {
          loading.value = true;
          try {
            const data = await AdminAPI.getAnnouncementList({
              page: pagination.value.current,
              pageSize: pagination.value.pageSize,
              keyword: keyword.value,
              excludeCategory: 'banner'  // 公告管理排除轮播图，轮播图在轮播图管理单独展示
            });
            
            dataList.value = data.list;
            pagination.value.total = data.total;
          } catch (e) {
            TDesign.MessagePlugin.error(e.message);
          } finally {
            loading.value = false;
          }
        };
        
        // 查询（重置分页到第1页）
        const handleSearch = () => {
          pagination.value.current = 1;
          loadData();
        };

        // 重置搜索
        const resetSearch = () => {
          keyword.value = '';
          pagination.value.current = 1;
          loadData();
        };
        
        // 分页切换
        const handlePageChange = (pageInfo) => {
          pagination.value.current = pageInfo.current;
          pagination.value.pageSize = pageInfo.pageSize;
          loadData();
        };
        
        // 新增
        const handleAdd = () => {
          dialogMode.value = 'add';
          formData.value = {
            status: 1,
            category: 'system',
            title: '',
            content: '',
            link: '',
            coverImage: '',         // camelCase → 云函数转换为 DB cover_image
            coverImageURL: ''       // 临时 URL（仅用于页面显示，不提交）
          };
          dialogVisible.value = true;
        };
        
        // 编辑
        const handleEdit = async (row) => {
          dialogMode.value = 'edit';
          // DB 返回 snake_case（cover_image），映射为 camelCase 供表单使用
          formData.value = {
            id: row.id,
            title: row.title,
            category: row.category,
            content: row.content,
            link: row.link,
            status: row.status,
            coverImage: row.cover_image || '',  // camelCase
            coverImageURL: ''                    // 仅用于显示
          };
          
          // 如果有封面图片（fileID），转换为临时 URL 用于预览
          if (row.cover_image) {
            try {
              const tempURL = await window.CloudStorageHelper.getSingleTempURL(row.cover_image);
              formData.value.coverImageURL = tempURL;
            } catch (error) {
              console.error('获取封面临时URL失败:', error);
            }
          }
          
          dialogVisible.value = true;
        };
        
        // 切换置顶状态
        const handleToggleTop = async (row) => {
          const newIsTop = row.is_top === 1 ? 0 : 1;
          const action = newIsTop === 1 ? '置顶' : '取消置顶';
          try {
            await AdminAPI.updateAnnouncement({ id: row.id, isTop: newIsTop });
            TDesign.MessagePlugin.success(`公告已${action}`);
            loadData();
          } catch (e) {
            TDesign.MessagePlugin.error(e.message);
          }
        };

        // 切换显示/隐藏状态
        const handleToggleStatus = async (row) => {
          const newStatus = row.status === 1 ? 0 : 1;
          const action = newStatus === 1 ? '显示' : '隐藏';
          try {
            await AdminAPI.updateAnnouncement({ id: row.id, status: newStatus });
            TDesign.MessagePlugin.success(`公告已${action}`);
            loadData();
          } catch (e) {
            TDesign.MessagePlugin.error(e.message);
          }
        };

        const handleDelete = async (row) => {
          try {
            await AdminAPI.deleteAnnouncement(row.id);
            
            // 删除云存储文件（row 是 DB 返回的数据，字段仍为 snake_case cover_image）
            if (row.cover_image) {
              try {
                await window.CloudStorageHelper.deleteFiles([row.cover_image]);
                console.log('✅ 封面图片已删除');
              } catch (error) {
                console.warn('⚠️ 封面图片删除失败（不阻塞）:', error);
              }
            }
            
            TDesign.MessagePlugin.success('删除成功');
            loadData();
          } catch (e) {
            TDesign.MessagePlugin.error(e.message);
          }
        };
        
        // 保存
        const handleSave = async () => {
          // 验证必填项
          if (!formData.value.title) {
            TDesign.MessagePlugin.warning('请输入公告标题');
            return false;
          }
          
          if (!formData.value.content) {
            TDesign.MessagePlugin.warning('请输入公告内容');
            return false;
          }
          
          try {
            // 所有字段使用 camelCase，云函数负责转换为 snake_case 存入 DB
            const submitData = {
              title: formData.value.title,
              category: formData.value.category,
              content: formData.value.content,
              link: formData.value.link || '',
              coverImage: formData.value.coverImage || '',  // camelCase → DB cover_image
              status: formData.value.status
            };
            
            if (dialogMode.value === 'add') {
              await AdminAPI.createAnnouncement(submitData);
            } else {
              submitData.id = formData.value.id;
              await AdminAPI.updateAnnouncement(submitData);
            }
            
            TDesign.MessagePlugin.success('保存成功');
            dialogVisible.value = false;
            loadData();
          } catch (e) {
            TDesign.MessagePlugin.error(e.message);
            return false;
          }
        };
        
        // 弹窗关闭时清理
        const handleDialogClose = () => {
          formData.value = {};
        };
        
        // 挂载时加载数据
        onMounted(() => {
          console.log('✅ 公告管理页面加载完成');
          console.log('✅ CloudStorage 状态:', window.CloudStorage ? '已初始化' : '未初始化');
          console.log('✅ CloudStorageHelper 状态:', window.CloudStorageHelper ? '已挂载' : '未挂载');
          loadData();
        });
        
        return {
          activeMenuKey: 'announcement-list',// 侧边栏导航
          adminInfo,
          handleMenuChange,
          handleLogout,
          
          // 数据状态
          loading,
          dataList,
          dialogVisible,
          dialogMode,
          formData,
          keyword,
          pagination,
          typeOptions,
          columns,
          
          // 方法
          loadData,
          handleSearch,
          resetSearch,
          handlePageChange,
          handleAdd,
          handleEdit,
          handleToggleTop,
          handleToggleStatus,
          handleDelete,
          handleSave,
          handleDialogClose,
        };
      }
    }).use(TDesign)
      .component('sidebar-menu', SidebarNavigation.SidebarMenu)
      .component('cloud-image-upload', CloudUploadComponents.CloudImageUpload)
      .mount('#app');
  </script>
</body>
</html>
