<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知管理 - 天道文化后台</title>
  
  <link rel="stylesheet" href="../../assets/libs/tdesign.min.css">
  <link rel="stylesheet" href="../../assets/css/tokens.css?v=20260421">
  
  <style>
    .toolbar {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <t-aside width="240px" style="
          background: #fff;
          border-right: 1px solid #dcdcdc;
          overflow-y: auto;
        ">
          <t-menu
            value="notification-list"
            :default-expanded="['user', 'order', 'course', 'ambassador', 'system']"
            theme="light"
            @change="handleMenuChange"
          >
            <t-menu-item value="dashboard">
              <template #icon><t-icon name="dashboard" /></template>
              数据概览
            </t-menu-item>
            
            <t-submenu value="user">
              <template #icon><t-icon name="user" /></template>
              <template #title>用户管理</template>
              <t-menu-item value="user-list">学员列表</t-menu-item>
              <t-menu-item value="user-referee">推荐人管理</t-menu-item>
              <t-menu-item value="user-referee-logs">推荐人变更记录</t-menu-item>
            </t-submenu>
            
            <t-submenu value="order">
              <template #icon><t-icon name="order" /></template>
              <template #title>订单管理</template>
              <t-menu-item value="order-list">订单列表</t-menu-item>
              <t-menu-item value="order-refund">退款管理</t-menu-item>
              <t-menu-item value="withdraw-audit">提现审核</t-menu-item>
            </t-submenu>
            
            <t-submenu value="course">
              <template #icon><t-icon name="file" /></template>
              <template #title>课程管理</template>
              <t-menu-item value="course-list">课程列表</t-menu-item>
              <t-menu-item value="schedule-list">排期管理</t-menu-item>
              <t-menu-item value="appointment-list">预约管理</t-menu-item>
              <t-menu-item value="case-list">案例管理</t-menu-item>
              <t-menu-item value="material-list">资料管理</t-menu-item>
              <t-menu-item value="academy-content">学院内容</t-menu-item>
            </t-submenu>
            
            <t-submenu value="ambassador">
              <template #icon><t-icon name="usergroup" /></template>
              <template #title>大使管理</template>
              <t-menu-item value="ambassador-list">大使列表</t-menu-item>
              <t-menu-item value="application-audit">申请审核</t-menu-item>
              <t-menu-item value="activity-list">活动管理</t-menu-item>
              <t-menu-item value="contract-list">合约管理</t-menu-item>
            </t-submenu>
            
            <t-submenu value="system">
              <template #icon><t-icon name="setting" /></template>
              <template #title>系统管理</template>
              <t-menu-item value="admin-list">管理员管理</t-menu-item>
              <t-menu-item value="config">系统配置</t-menu-item>
              <t-menu-item value="banner-list">轮播图管理</t-menu-item>
              <t-menu-item value="announcement-list">公告管理</t-menu-item>
              <t-menu-item value="feedback-list">反馈管理</t-menu-item>
              <t-menu-item value="notification-list">通知管理</t-menu-item>
              <t-menu-item value="level-config">等级配置</t-menu-item>
            </t-submenu>
          </t-menu>
        </t-aside>
        
        <!-- 主内容区 -->
        <t-content class="page-content">
          <!-- 页面头部 -->
          <div class="page-header">
            <h1 class="page-title">通知管理</h1>
          </div>
          
          <!-- 标签页 -->
          <t-tabs v-model="activeTab" @change="handleTabChange">
            <t-tab-panel value="send" label="发送通知"></t-tab-panel>
            <t-tab-panel value="config" label="通知配置"></t-tab-panel>
            <t-tab-panel value="logs" label="通知日志"></t-tab-panel>
          </t-tabs>
          
          <!-- 发送通知 -->
          <div class="table-card" v-if="activeTab === 'send'">
            <div class="toolbar">
              <t-space>
                <t-button theme="success" @click="handleSendNotification">
                  <template #icon><t-icon name="mail" /></template>
                  发送通知
                </t-button>
              </t-space>
            </div>
            
            <t-table
              :data="notificationList"
              :columns="notificationColumns"
              :loading="loading"
              :pagination="pagination"
              @page-change="handlePageChange"
              row-key="id"
            >
              <template #type="{ row }">
                <t-tag v-if="row.type === 'system'" theme="primary">系统</t-tag>
                <t-tag v-else-if="row.type === 'order'" theme="success">订单</t-tag>
                <t-tag v-else theme="warning">活动</t-tag>
              </template>
            </t-table>
          </div>
          
          <!-- 通知配置 -->
          <div class="table-card" v-if="activeTab === 'config'">
            <div class="toolbar">
              <t-space>
                <t-button theme="primary" @click="handleAddConfig">
                  <template #icon><t-icon name="add" /></template>
                  新增配置
                </t-button>
              </t-space>
            </div>
            
            <t-table
              :data="configList"
              :columns="configColumns"
              :loading="loading"
              :pagination="configPagination"
              @page-change="handleConfigPageChange"
              row-key="id"
            >
              <template #trigger_type="{ row }">
                <t-tag v-if="row.trigger_type === 'before_class'" theme="primary">上课前</t-tag>
                <t-tag v-else-if="row.trigger_type === 'after_pay'" theme="success">支付后</t-tag>
                <t-tag v-else theme="warning">其他</t-tag>
              </template>
              
              <template #operation="{ row }">
                <t-space>
                  <t-button size="small" variant="text" theme="primary" @click="handleEditConfig(row)">编辑</t-button>
                  <t-button size="small" variant="text" theme="danger" @click="handleDeleteConfig(row)">删除</t-button>
                </t-space>
              </template>
            </t-table>
          </div>
          
          <!-- 通知日志 -->
          <div class="table-card" v-if="activeTab === 'logs'">
            <div class="search-form">
              <t-form layout="inline">
                <t-form-item label="开始日期">
                  <t-date-picker v-model="logFilters.start_date" clearable style="width: 200px;"></t-date-picker>
                </t-form-item>
                <t-form-item label="结束日期">
                  <t-date-picker v-model="logFilters.end_date" clearable style="width: 200px;"></t-date-picker>
                </t-form-item>
                <t-form-item>
                  <t-space>
                    <t-button theme="primary" @click="handleSearchLogs">查询</t-button>
                    <t-button theme="default" @click="handleResetLogs">重置</t-button>
                  </t-space>
                </t-form-item>
              </t-form>
            </div>
            
            <t-table
              :data="logList"
              :columns="logColumns"
              :loading="loading"
              :pagination="logPagination"
              @page-change="handleLogPageChange"
              row-key="id"
            >
              <template #send_status="{ row }">
                <t-tag v-if="row.send_status === 1" theme="success">成功</t-tag>
                <t-tag v-else theme="danger">失败</t-tag>
              </template>
            </t-table>
          </div>
        </t-content>
      </t-layout>
    </t-layout>
    
    <!-- 发送通知对话框 -->
    <t-dialog
      v-model:visible="sendDialogVisible"
      header="发送通知"
      width="600px"
      @confirm="handleConfirmSend"
    >
      <t-form :data="sendForm" label-width="100px">
        <t-form-item label="接收对象">
          <t-select v-model="sendForm.target" :options="targetOptions" />
        </t-form-item>
        <t-form-item label="通知类型">
          <t-select v-model="sendForm.type" :options="typeOptions" />
        </t-form-item>
        <t-form-item label="通知标题">
          <t-input v-model="sendForm.title" placeholder="请输入通知标题" />
        </t-form-item>
        <t-form-item label="通知内容">
          <t-textarea v-model="sendForm.content" :autosize="{ minRows: 6 }" placeholder="请输入通知内容" />
        </t-form-item>
      </t-form>
    </t-dialog>
    
    <!-- 配置对话框 -->
    <t-dialog
      v-model:visible="configDialogVisible"
      :header="configMode === 'add' ? '新增配置' : '编辑配置'"
      width="600px"
      @confirm="handleConfirmConfig"
    >
      <t-form :data="configForm" label-width="100px">
        <t-form-item label="课程">
          <t-select v-model="configForm.course_id" :options="courseOptions" placeholder="选择课程" />
        </t-form-item>
        <t-form-item label="触发类型">
          <t-select v-model="configForm.trigger_type" :options="triggerOptions" placeholder="选择触发类型" />
        </t-form-item>
        <t-form-item label="模板ID">
          <t-input v-model="configForm.template_id" placeholder="请输入模板ID" />
        </t-form-item>
        <t-form-item label="提前天数">
          <t-input-number v-model="configForm.advance_days" :min="0" :max="30" style="width: 100%;" />
        </t-form-item>
      </t-form>
    </t-dialog>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/js/config.js?v=20260421"></script>
  <script src="../../assets/js/admin-api.js?v=20260421"></script>
  
  <script>
    const { createApp, ref, onMounted } = Vue;
    
    const app = createApp({
      setup() {
        // 管理员信息
        const adminInfo = ref(null);
        
        // 检查登录状态
        const checkAuth = () => {
          adminInfo.value = AdminAPI.getCurrentAdmin();
          if (!adminInfo.value) {
            window.location.href = '../../index.html';
            return false;
          }
          return true;
        };
        
        // 退出登录
        const handleLogout = () => {
          AdminAPI.logout();
        };
        
        // 菜单切换
        const handleMenuChange = (value) => {
          const routes = {
            'dashboard': '../../dashboard.html',
            'user-list': '../user/list.html',
            'user-referee': '../user/referee.html',
            'user-referee-logs': '../user/referee-logs.html',
            'order-list': '../order/list.html',
            'order-refund': '../order/refund.html',
            'withdraw-audit': '../order/withdraw-audit.html',
            'course-list': '../course/list.html',
            'schedule-list': '../course/schedule.html',
            'appointment-list': '../course/appointment.html',
            'case-list': '../course/case.html',
            'material-list': '../course/material.html',
            'academy-content': '../course/academy.html',
            'ambassador-list': '../ambassador/list.html',
            'application-audit': '../ambassador/application-audit.html',
            'activity-list': '../ambassador/activity.html',
            'contract-list': '../ambassador/contract.html',
            'admin-list': '../system/admin.html',
            'config': '../system/config.html',
            'announcement-list': '../system/announcement.html',
            'feedback-list': '../system/feedback.html',
            'notification-list': '../system/notification.html',
            'level-config': '../system/level-config.html',
          };
          
          if (routes[value]) {
            window.location.href = routes[value];
          }
        };
        
        const loading = ref(false);
        const activeTab = ref('send');
        
        // 发送通知
        const notificationList = ref([]);
        const pagination = ref({ current: 1, pageSize: 20, total: 0 });
        const sendDialogVisible = ref(false);
        const sendForm = ref({ target: 'all', type: 'system', title: '', content: '' });
        
        const targetOptions = [
          { label: '全部用户', value: 'all' },
          { label: '全部大使', value: 'ambassadors' },
          { label: '指定用户', value: 'users' }
        ];
        
        const typeOptions = [
          { label: '系统通知', value: 'system' },
          { label: '订单通知', value: 'order' },
          { label: '活动通知', value: 'activity' }
        ];
        
        const notificationColumns = [
          { colKey: 'title', title: '通知标题', width: 250 },
          { colKey: 'type', title: '类型', width: 100 },
          { colKey: 'target_count', title: '接收人数', width: 100 },
          { colKey: 'created_at', title: '发送时间', width: 160 }
        ];
        
        // 通知配置
        const configList = ref([]);
        const configPagination = ref({ current: 1, pageSize: 20, total: 0 });
        const configDialogVisible = ref(false);
        const configMode = ref('add');
        const configForm = ref({ course_id: null, trigger_type: '', template_id: '', advance_days: 1 });
        const courseOptions = ref([]);
        
        const triggerOptions = [
          { label: '上课前提醒', value: 'before_class' },
          { label: '支付成功后', value: 'after_pay' },
          { label: '预约成功后', value: 'after_appointment' }
        ];
        
        const configColumns = [
          { colKey: 'id', title: 'ID', width: 80 },
          { colKey: 'course_name', title: '课程名称', width: 200 },
          { colKey: 'trigger_type', title: '触发类型', width: 120 },
          { colKey: 'template_id', title: '模板ID', width: 150 },
          { colKey: 'advance_days', title: '提前天数', width: 100 },
          { colKey: 'operation', title: '操作', width: 150, fixed: 'right' }
        ];
        
        // 通知日志
        const logList = ref([]);
        const logPagination = ref({ current: 1, pageSize: 20, total: 0 });
        const logFilters = ref({ start_date: '', end_date: '' });
        
        const logColumns = [
          { colKey: 'id', title: 'ID', width: 80 },
          { colKey: 'user_name', title: '接收用户', width: 120 },
          { colKey: 'notification_title', title: '通知标题', width: 250 },
          { colKey: 'send_status', title: '发送状态', width: 100 },
          { colKey: 'send_time', title: '发送时间', width: 160 }
        ];
        
        // 标签页切换
        const handleTabChange = (value) => {
          activeTab.value = value;
          if (value === 'send') {
            loadNotificationList();
          } else if (value === 'config') {
            loadConfigList();
          } else if (value === 'logs') {
            loadLogList();
          }
        };
        
        // 加载通知列表
        const loadNotificationList = async () => {
          loading.value = true;
          try {
            const result = await AdminAPI.getNotificationList({
              page: pagination.value.current,
              pageSize: pagination.value.pageSize
            });
            notificationList.value = result.list || [];
            pagination.value.total = result.total || 0;
          } catch (error) {
            TDesign.MessagePlugin.error('加载失败: ' + error.message);
          } finally {
            loading.value = false;
          }
        };
        
        // 加载配置列表
        const loadConfigList = async () => {
          loading.value = true;
          try {
            const result = await AdminAPI.getNotificationConfigList({
              page: configPagination.value.current,
              pageSize: configPagination.value.pageSize
            });
            configList.value = result.list || [];
            configPagination.value.total = result.total || 0;
          } catch (error) {
            TDesign.MessagePlugin.error('加载失败: ' + error.message);
          } finally {
            loading.value = false;
          }
        };
        
        // 加载日志列表
        const loadLogList = async () => {
          loading.value = true;
          try {
            const result = await AdminAPI.getNotificationLogs({
              page: logPagination.value.current,
              pageSize: logPagination.value.pageSize,
              ...logFilters.value
            });
            logList.value = result.list || [];
            logPagination.value.total = result.total || 0;
          } catch (error) {
            TDesign.MessagePlugin.error('加载失败: ' + error.message);
          } finally {
            loading.value = false;
          }
        };
        
        // 加载课程列表
        const loadCourses = async () => {
          try {
            const data = await AdminAPI.getAllCourses();
            courseOptions.value = data.map(c => ({ label: c.name, value: c.id }));
          } catch (error) {
            console.error('加载课程列表失败:', error);
          }
        };
        
        // 发送通知
        const handleSendNotification = () => {
          sendForm.value = { target: 'all', type: 'system', title: '', content: '' };
          sendDialogVisible.value = true;
        };
        
        const handleConfirmSend = async () => {
          try {
            await AdminAPI.sendNotification(sendForm.value);
            TDesign.MessagePlugin.success('发送成功');
            sendDialogVisible.value = false;
            loadNotificationList();
          } catch (error) {
            TDesign.MessagePlugin.error('发送失败: ' + error.message);
          }
        };
        
        // 配置管理
        const handleAddConfig = () => {
          configMode.value = 'add';
          configForm.value = { course_id: null, trigger_type: '', template_id: '', advance_days: 1 };
          configDialogVisible.value = true;
        };
        
        const handleEditConfig = (row) => {
          configMode.value = 'edit';
          configForm.value = { ...row };
          configDialogVisible.value = true;
        };
        
        const handleConfirmConfig = async () => {
          try {
            if (configMode.value === 'add') {
              await AdminAPI.createNotificationConfig(configForm.value);
            } else {
              await AdminAPI.updateNotificationConfig(configForm.value);
            }
            TDesign.MessagePlugin.success('保存成功');
            configDialogVisible.value = false;
            loadConfigList();
          } catch (error) {
            TDesign.MessagePlugin.error('保存失败: ' + error.message);
          }
        };
        
        const handleDeleteConfig = async (row) => {
          try {
            await AdminAPI.deleteNotificationConfig({ id: row.id });
            TDesign.MessagePlugin.success('删除成功');
            loadConfigList();
          } catch (error) {
            TDesign.MessagePlugin.error('删除失败: ' + error.message);
          }
        };
        
        // 日志查询
        const handleSearchLogs = () => {
          logPagination.value.current = 1;
          loadLogList();
        };
        
        const handleResetLogs = () => {
          logFilters.value = { start_date: '', end_date: '' };
          handleSearchLogs();
        };
        
        // 分页
        const handlePageChange = (pageInfo) => {
          pagination.value.current = pageInfo.current;
          pagination.value.pageSize = pageInfo.pageSize;
          loadNotificationList();
        };
        
        const handleConfigPageChange = (pageInfo) => {
          configPagination.value.current = pageInfo.current;
          configPagination.value.pageSize = pageInfo.pageSize;
          loadConfigList();
        };
        
        const handleLogPageChange = (pageInfo) => {
          logPagination.value.current = pageInfo.current;
          logPagination.value.pageSize = pageInfo.pageSize;
          loadLogList();
        };
        
        onMounted(() => {
          if (checkAuth()) {
            loadNotificationList();
            loadCourses();
          }
        });
        
        return {
          adminInfo,
          handleLogout,
          handleMenuChange,
          loading,
          activeTab,
          notificationList,
          pagination,
          sendDialogVisible,
          sendForm,
          targetOptions,
          typeOptions,
          notificationColumns,
          configList,
          configPagination,
          configDialogVisible,
          configMode,
          configForm,
          courseOptions,
          triggerOptions,
          configColumns,
          logList,
          logPagination,
          logFilters,
          logColumns,
          handleTabChange,
          handleSendNotification,
          handleConfirmSend,
          handleAddConfig,
          handleEditConfig,
          handleConfirmConfig,
          handleDeleteConfig,
          handleSearchLogs,
          handleResetLogs,
          handlePageChange,
          handleConfigPageChange,
          handleLogPageChange,
        };
      }
    });
    
    app.use(TDesign);
    app.mount('#app');
  </script>
</body>
</html>
