<!DOCTYPE html><html><head><meta charset="UTF-8"><title>等级配置</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><style>body{margin:0;padding:20px;background:#f5f5f5}.c{max-width:1200px;margin:0 auto;background:white;border-radius:8px;padding:24px}
    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }

  </style></head><body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="level-config"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="c"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;"><h1 style="font-size:20px;font-weight:600;margin:0;">等级配置</h1><t-button theme="primary" @click="handleAdd">+ 新增等级</t-button></div><t-table :data="d" :columns="cols" :loading="lg" bordered><template #op="{row}"><t-space><t-button size="small" variant="text" @click="edit(row)">编辑</t-button><t-button size="small" variant="text" theme="danger" @click="handleDel(row)">删除</t-button></t-space></template></t-table></div><t-dialog v-model:visible="addV" header="新增等级配置" width="500px" @confirm="saveAdd"><t-form v-if="addF" :data="addF" label-width="120px"><t-form-item label="等级值"><t-input-number v-model="addF.level" :min="1" style="width:100%;"/></t-form-item><t-form-item label="等级名称"><t-input v-model="addF.levelName" placeholder="如：天道宗师"/></t-form-item><t-form-item label="升级方式"><t-select v-model="addF.upgradeType" style="width:100%;"><t-option value="payment" label="付费升级"/><t-option value="contract" label="签约升级"/></t-select></t-form-item><t-form-item label="等级描述"><t-textarea v-model="addF.description" placeholder="等级描述"/></t-form-item></t-form></t-dialog><t-dialog v-model:visible="v" header="编辑等级配置" width="700px" @confirm="save"><t-form v-if="f" :data="f" label-width="150px"><t-form-item label="等级名称"><t-input v-model="f.level_name" disabled/></t-form-item><t-form-item label="等级描述"><t-input v-model="f.level_desc"/></t-form-item><t-form-item label="升级费用"><t-input-number v-model="f.upgrade_payment_amount" :min="0"/></t-form-item><t-form-item label="冻结积分"><t-input-number v-model="f.frozen_points" :min="0"/></t-form-item><t-form-item label="单次解冻积分"><t-input-number v-model="f.unfreeze_per_referral" :min="0"/></t-form-item><t-form-item label="基础功德率"><t-input-number v-model="f.merit_rate_basic" :min="0" :max="1" :step="0.01"/></t-form-item><t-form-item label="高级功德率"><t-input-number v-model="f.merit_rate_advanced" :min="0" :max="1" :step="0.01"/></t-form-item><t-form-item label="基础现金率"><t-input-number v-model="f.cash_rate_basic" :min="0" :max="1" :step="0.01"/></t-form-item><t-form-item label="高级现金率"><t-input-number v-model="f.cash_rate_advanced" :min="0" :max="1" :step="0.01"/></t-form-item><t-form-item label="基础赠课配额"><t-input-number v-model="f.gift_quota_basic" :min="0"/></t-form-item><t-form-item label="高级赠课配额"><t-input-number v-model="f.gift_quota_advanced" :min="0"/></t-form-item></t-form></t-dialog>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script><script src="../../assets/libs/tdesign.min.js"></script><script src="../../assets/js/config.js"></script><script src="../../assets/js/admin-api.js"></script>
  <script src="../../assets/js/sidebar-navigation.js"></script><script>const{createApp,ref,onMounted}=Vue;createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        const lg=ref(false);const d=ref([]);const v=ref(false);const f=ref(null);const addV=ref(false);const addF=ref({level:6,levelName:'',upgradeType:'payment',description:''});const cols=[{colKey:'level',title:'等级',width:80},{colKey:'level_name',title:'等级名称',width:150},{colKey:'level_desc',title:'等级描述',width:200},{colKey:'upgrade_payment_amount',title:'升级费用',width:100},{colKey:'frozen_points',title:'冻结积分',width:100},{colKey:'unfreeze_per_referral',title:'单次解冻',width:100},{colKey:'merit_rate_basic',title:'基础功德率',width:100},{colKey:'cash_rate_basic',title:'基础现金率',width:100},{colKey:'op',title:'操作',width:150,cell:'op'}];const ld=async()=>{lg.value=true;try{d.value=await AdminAPI.getLevelConfig();}catch(e){TDesign.MessagePlugin.error(e.message);}finally{lg.value=false;}};const edit=row=>{f.value={...row};v.value=true;};const save=async()=>{try{await AdminAPI.updateLevelConfig(f.value);TDesign.MessagePlugin.success('保存成功');v.value=false;ld();}catch(e){TDesign.MessagePlugin.error(e.message);}};const handleAdd=()=>{addF.value={level:Math.max(...(d.value.map(r=>r.level)||[0]))+1,levelName:'',upgradeType:'payment',description:''};addV.value=true;};const saveAdd=async()=>{if(!addF.value.levelName){TDesign.MessagePlugin.warning('请输入等级名称');return;}try{await AdminAPI.createAmbassadorLevelConfig(addF.value);TDesign.MessagePlugin.success('新增成功');addV.value=false;ld();}catch(e){TDesign.MessagePlugin.error(e.message);}};const handleDel=async row=>{const ok=await TDesign.DialogPlugin.confirm({header:'确认删除',body:`确认删除等级「${row.level_name}」吗？`,theme:'danger'});if(!ok)return;try{await AdminAPI.deleteAmbassadorLevelConfig(row.level);TDesign.MessagePlugin.success('删除成功');ld();}catch(e){TDesign.MessagePlugin.error(e.message);}};onMounted(ld);return {
          activeMenuKey: 'level-config',// 侧边栏导航
          adminInfo,
          handleMenuChange,
          handleLogout,
          lg,d,v,f,addV,addF,cols,edit,save,handleAdd,saveAdd,handleDel
        };}}).use(TDesign).component('sidebar-menu', SidebarNavigation.SidebarMenu).mount('#app');</script></body></html>
