<!DOCTYPE html><html><head><meta charset="UTF-8">
  <link rel="icon" href="data:,"><title>系统配置</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><link rel="stylesheet" href="../../assets/css/tokens.css?v=20260305"><style>.c{max-width:900px;margin:0 auto;background:white;border-radius:8px;padding:24px}.t{font-size:20px;font-weight:600;margin-bottom:24px}
  </style></head><body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="config"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="c"><h1 class="t">系统配置</h1><t-form :data="cfg" label-width="150px"><t-form-item label="系统名称"><t-input v-model="cfg.system_name"/></t-form-item><t-form-item label="客服电话"><t-input v-model="cfg.service_phone"/></t-form-item><t-form-item label="客服微信"><t-input v-model="cfg.service_wechat"/></t-form-item><t-form-item label="积分兑换比例"><t-input-number v-model="cfg.points_rate" :min="0.01" :step="0.01"/><template #help>1积分 = ? 元</template></t-form-item><t-form-item label="提现最低金额"><t-input-number v-model="cfg.withdraw_min_amount" :min="1"/><template #help>单位：元</template></t-form-item><t-form-item label="推荐奖励积分"><t-input-number v-model="cfg.referral_reward_points" :min="0"/></t-form-item><t-form-item label="关于我们"><t-textarea v-model="cfg.about_us" :autosize="{minRows:6}"/></t-form-item><t-form-item><t-button theme="primary" @click="save" :loading="lg">保存配置</t-button></t-form-item></t-form></div>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script><script src="../../assets/libs/tdesign.min.js"></script><script src="../../assets/js/config.js?v=20260305"></script><script src="../../assets/js/admin-api.js?v=20260309"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260305"></script><script>const{createApp,ref,onMounted}=Vue;createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        const lg=ref(false);const cfg=ref({});const ld=async()=>{try{cfg.value=await AdminAPI.getSystemConfig();}catch(e){TDesign.MessagePlugin.error(e.message);}};const save=async()=>{lg.value=true;try{await AdminAPI.updateSystemConfig(cfg.value);TDesign.MessagePlugin.success('保存成功');}catch(e){TDesign.MessagePlugin.error(e.message);}finally{lg.value=false;}};onMounted(ld);return {
          activeMenuKey: 'config',// 侧边栏导航
          adminInfo,
          handleMenuChange,
          handleLogout,
          lg,cfg,save
        };}}).use(TDesign).component('sidebar-menu', SidebarNavigation.SidebarMenu).mount('#app');</script></body></html>
