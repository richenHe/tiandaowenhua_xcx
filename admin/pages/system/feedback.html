<!DOCTYPE html><html><head><meta charset="UTF-8">
  <link rel="icon" href="data:,"><title>反馈管理</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><link rel="stylesheet" href="../../assets/css/tokens.css?v=20260331"><style>.c{max-width:1400px;margin:0 auto;background:white;border-radius:8px;padding:24px}
    .feedback-images{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
    .feedback-img-item{width:100px;height:100px;object-fit:cover;border-radius:4px;border:1px solid #dcdcdc;cursor:pointer;}
    .feedback-img-item:hover{opacity:0.85;}
  </style></head><body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="feedback-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="c"><h1 style="font-size:20px;font-weight:600;margin-bottom:24px;">反馈管理</h1><div style="display:flex;gap:12px;margin-bottom:20px;"><t-select v-model="st" :options="stOpts" placeholder="状态" clearable style="width:150px;"/><t-button theme="primary" @click="hs">查询</t-button><t-button @click="rs">重置</t-button></div><t-table :data="d" :columns="cols" :loading="lg" :pagination="pg" @page-change="chg" row-key="id" bordered stripe><template #status="{row}"><t-tag v-if="row.status===0" theme="warning">待处理</t-tag><t-tag v-else-if="row.status===1" theme="success">已回复</t-tag><t-tag v-else-if="row.status===2" theme="default">已关闭</t-tag></template><template #op="{row}"><t-button size="small" variant="text" @click="view(row)">查看</t-button><t-button v-if="row.status===0" size="small" variant="text" theme="success" @click="handle(row)">标记已处理</t-button></template></t-table></div><t-dialog v-model:visible="v" header="反馈详情" width="640px" :footer="false">
  <t-descriptions v-if="cr" bordered>
    <t-descriptions-item label="用户姓名">{{(cr.user&&cr.user.real_name)||cr.contact||'-'}}</t-descriptions-item>
    <t-descriptions-item label="手机号">{{(cr.user&&cr.user.phone)||'-'}}</t-descriptions-item>
    <t-descriptions-item label="反馈内容" :span="2">{{cr.content}}</t-descriptions-item>
    <t-descriptions-item label="反馈图片" :span="2">
      <div v-if="crImages && crImages.length > 0" class="feedback-images">
        <img v-for="(img, idx) in crImages" :key="idx" :src="img" class="feedback-img-item" alt="反馈图片" @click="openImage(img)">
      </div>
      <span v-else style="color:#999;">无图片</span>
    </t-descriptions-item>
    <t-descriptions-item label="提交时间" :span="2">{{cr.created_at}}</t-descriptions-item>
    <t-descriptions-item label="状态" :span="2">
      <t-tag v-if="cr.status===0" theme="warning">待处理</t-tag>
      <t-tag v-else-if="cr.status===1" theme="success">已回复</t-tag>
      <t-tag v-else-if="cr.status===2" theme="default">已关闭</t-tag>
    </t-descriptions-item>
    <t-descriptions-item v-if="cr.reply" label="回复内容" :span="2">{{cr.reply}}</t-descriptions-item>
    <t-descriptions-item v-if="cr.reply_time" label="回复时间" :span="2">{{cr.reply_time}}</t-descriptions-item>
  </t-descriptions>
  <div v-if="cr && cr.status===0" style="margin-top:16px;border-top:1px solid #f0f0f0;padding-top:16px;">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px;">回复反馈</div>
    <t-textarea v-model="replyContent" placeholder="请输入回复内容" :maxlength="500" :autosize="{minRows:3,maxRows:6}" style="margin-bottom:12px;" />
    <t-space>
      <t-button theme="primary" :loading="replyLoading" @click="submitReply">提交回复</t-button>
      <t-button theme="default" @click="handleClose">标记已处理</t-button>
    </t-space>
  </div>
</t-dialog>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <script src="../../assets/js/config.js?v=20260331"></script>
  <script src="../../assets/js/cloudbase.js?v=20260331"></script>
  <script src="../../assets/js/cloud-storage-helper.js?v=20260402"></script>
  <script src="../../assets/js/admin-api.js?v=20260331"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260331"></script><script>const{createApp,ref,onMounted}=Vue;createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        const lg = ref(false);
        const d = ref([]);
        const v = ref(false);
        const cr = ref(null);
        const crImages = ref([]);
        const st = ref(null);
        const pg = ref({ current: 1, pageSize: 20, total: 0 });
        // 云函数 getStatusText: 0待处理/1已回复/2已关闭
        const stOpts = [{ label: '待处理', value: 0 }, { label: '已回复', value: 1 }, { label: '已关闭', value: 2 }];
        const cols = [
          { colKey: 'user_name', title: '用户姓名', width: 120, cell: (h, { row }) => (row.user && row.user.real_name) || row.user_name || row.contact || '-' },
          { colKey: 'user_phone', title: '手机号', width: 130, cell: (h, { row }) => (row.user && row.user.phone) || row.user_phone || '-' },
          { colKey: 'content', title: '反馈内容', ellipsis: true },
          { colKey: 'created_at', title: '提交时间', width: 160 },
          { colKey: 'status', title: '状态', width: 100, cell: 'status' },
          { colKey: 'op', title: '操作', width: 150, cell: 'op' }
        ];

        const ld = async () => {
          lg.value = true;
          try {
            const data = await AdminAPI.getFeedbackList({ page: pg.value.current, pageSize: pg.value.pageSize, status: st.value });
            d.value = data.list;
            pg.value.total = data.total;
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
          finally { lg.value = false; }
        };
        const hs = () => { pg.value.current = 1; ld(); };
        const rs = () => { st.value = null; pg.value.current = 1; ld(); };
        const chg = pi => { pg.value.current = pi.current; pg.value.pageSize = pi.pageSize; ld(); };

        // 将 cloud:// fileID 直接构造为 CDN URL，无需 API 调用
        const toImgURL = (fileID) => {
          if (!fileID) return '';
          if (fileID.startsWith('http://') || fileID.startsWith('https://')) return fileID;
          if (!fileID.startsWith('cloud://')) return fileID;
          const s = fileID.slice(8);
          const dot = s.indexOf('.');
          const slash = s.indexOf('/');
          if (dot === -1 || slash === -1 || dot >= slash) return fileID;
          return `https://${s.slice(dot + 1, slash)}.tcb.qcloud.la/${s.slice(slash + 1)}`;
        };

        const view = (row) => {
          cr.value = row;
          crImages.value = [];
          v.value = true;
          // 解析 images 字段（云函数已转换为 HTTPS URL 或 cloud:// fileID）
          let imgs = [];
          if (row.images) {
            try { imgs = typeof row.images === 'string' ? JSON.parse(row.images) : row.images; } catch { imgs = []; }
          }
          console.log('[feedback] row.images raw:', row.images, 'parsed:', imgs);
          if (Array.isArray(imgs) && imgs.length > 0) {
            crImages.value = imgs.map(toImgURL).filter(Boolean);
          }
          console.log('[feedback] crImages:', crImages.value);
        };

        const handle = async (row) => {
          try { await AdminAPI.handleFeedback({ feedbackId: row.id }); TDesign.MessagePlugin.success('已标记为已处理'); ld(); }
          catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        const replyContent = ref('');
        const replyLoading = ref(false);
        const submitReply = async () => {
          if (!replyContent.value.trim()) { TDesign.MessagePlugin.warning('请输入回复内容'); return; }
          replyLoading.value = true;
          try {
            await AdminAPI.handleFeedback({ feedbackId: cr.value.id, reply: replyContent.value, status: 1 });
            TDesign.MessagePlugin.success('回复成功');
            v.value = false;
            replyContent.value = '';
            ld();
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
          finally { replyLoading.value = false; }
        };
        const handleClose = async () => {
          try { await AdminAPI.handleFeedback({ feedbackId: cr.value.id, status: 2 }); TDesign.MessagePlugin.success('已关闭'); v.value = false; ld(); }
          catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        const openImage = (url) => { window.open(url, '_blank'); };

        onMounted(ld);
        return {
          activeMenuKey: 'feedback-list',adminInfo, handleMenuChange, handleLogout,
          lg, d, v, cr, crImages, st, pg, stOpts, cols,
          ld, hs, rs, chg, view, handle,
          replyContent, replyLoading, submitReply, handleClose,
          openImage
        };}}).use(TDesign).component('sidebar-menu', SidebarNavigation.SidebarMenu).mount('#app');</script></body></html>
