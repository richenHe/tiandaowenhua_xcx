<!DOCTYPE html><html><head><meta charset="UTF-8">
  <link rel="icon" href="data:,"><title>管理员管理</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><style>body{margin:0;padding:20px;background:#f5f5f5}.c{max-width:1400px;margin:0 auto;background:white;border-radius:8px;padding:24px}.t{font-size:20px;font-weight:600;margin-bottom:24px}.b{display:flex;gap:12px;margin-bottom:20px}
    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }
    .avatar-upload-placeholder{width:80px;height:80px;border:2px dashed #dcdcdc;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#999;font-size:12px;gap:4px;transition:all 0.3s;}
    .avatar-upload-placeholder:hover{border-color:#0052d9;color:#0052d9;}
    .avatar-preview-wrap{position:relative;display:inline-block;}
    .avatar-preview-wrap img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:1px solid #dcdcdc;}
    .avatar-actions{margin-top:6px;display:flex;gap:6px;}
    .upload-tips{font-size:12px;color:#999;margin-top:4px;}
  </style></head><body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="admin-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="c"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;"><h1 class="t" style="margin:0;">管理员管理</h1><t-button theme="success" @click="add">+ 添加管理员</t-button></div><div class="b" style="flex-wrap:wrap;align-items:center;"><div style="width:200px;flex:0 0 200px;"><t-input v-model="k" placeholder="用户名/姓名" clearable /></div><t-button theme="primary" @click="ld">查询</t-button><t-button @click="rs">重置</t-button></div><t-table :data="d" :columns="cols" :loading="lg" :pagination="pg" @page-change="chg" bordered stripe><template #role="{row}"><t-tag v-if="row.role==='super'" theme="danger">超级管理员</t-tag><t-tag v-else theme="primary">普通管理员</t-tag></template><template #status="{row}"><t-tag v-if="row.status===1" theme="success">正常</t-tag><t-tag v-else theme="danger">禁用</t-tag></template><template #op="{row}"><t-space><t-button size="small" variant="text" @click="edit(row)">编辑</t-button><t-button size="small" variant="text" theme="warning" @click="toggle(row)">{{row.status===1?'禁用':'启用'}}</t-button><t-button v-if="row.role!=='super'" size="small" variant="text" theme="danger" @click="del(row)">删除</t-button></t-space></template></t-table></div><t-dialog v-model:visible="v" :header="m==='add'?'添加管理员':'编辑管理员'" @confirm="save">
  <t-form :data="f" :rules="rules" label-width="100px">
    <t-form-item label="头像">
      <input type="file" ref="avatarFileInput" accept="image/*" @change="handleAvatarChange" style="display:none;">
      <div v-if="!f.avatarDisplay" class="avatar-upload-placeholder" @click="triggerAvatarUpload">
        <t-icon name="user-circle" style="font-size:24px;"/>
        <span>上传头像</span>
      </div>
      <div v-else class="avatar-preview-wrap">
        <img :src="f.avatarDisplay" alt="头像预览">
        <div class="avatar-actions">
          <t-button size="small" variant="outline" @click="triggerAvatarUpload" :loading="avatarUploading">更换</t-button>
          <t-button size="small" theme="danger" variant="outline" @click="removeAvatar">删除</t-button>
        </div>
      </div>
      <p class="upload-tips">支持 JPG/PNG，不超过 2MB</p>
    </t-form-item>
    <t-form-item label="用户名" name="username"><t-input v-model="f.username" :disabled="m==='edit'"/></t-form-item>
    <t-form-item label="姓名" name="real_name"><t-input v-model="f.real_name"/></t-form-item>
    <t-form-item v-if="m==='add'" label="密码" name="password"><t-input v-model="f.password" type="password"/></t-form-item>
    <t-form-item label="角色" name="role"><t-select v-model="f.role" :options="roleOpts"/></t-form-item>
  </t-form>
</t-dialog>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <script src="../../assets/js/config.js?v=20260227"></script>
  <script src="../../assets/js/cloudbase.js?v=20260227"></script>
  <script src="../../assets/js/cloud-storage-helper.js"></script>
  <script src="../../assets/js/admin-api.js?v=20260227f"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260227ddc"></script><script>const{createApp,ref,onMounted}=Vue;createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        const lg = ref(false);
        const d = ref([]);
        const v = ref(false);
        const m = ref('add');
        const f = ref({});
        const k = ref('');
        const pg = ref({ current: 1, pageSize: 20, total: 0 });
        const roleOpts = [{ label: '超级管理员', value: 'super' }, { label: '普通管理员', value: 'normal' }];
        const cols = [
          { colKey: 'username', title: '用户名', width: 150 },
          { colKey: 'real_name', title: '姓名', width: 120 },
          { colKey: 'role', title: '角色', width: 150, cell: 'role' },
          { colKey: 'last_login_at', title: '最后登录', width: 160 },
          { colKey: 'status', title: '状态', width: 100, cell: 'status' },
          { colKey: 'op', title: '操作', width: 200, cell: 'op' }
        ];
        const rules = {
          username: [{ required: true, message: '请输入用户名' }],
          real_name: [{ required: true, message: '请输入姓名' }],
          password: [{ required: true, message: '请输入密码' }],
          role: [{ required: true, message: '请选择角色' }]
        };

        // 头像上传
        const avatarFileInput = ref(null);
        const avatarUploading = ref(false);
        const triggerAvatarUpload = () => avatarFileInput.value && avatarFileInput.value.click();
        const handleAvatarChange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const valid = CloudStorageHelper.validateFile(file, { maxSize: 2 * 1024 * 1024, accept: ['image/jpeg', 'image/png'] });
          if (!valid.valid) { TDesign.MessagePlugin.error(valid.message); return; }
          avatarUploading.value = true;
          try {
            const cloudPath = CloudStorageHelper.generateCloudPath('admins/avatars', file.name);
            const result = await CloudStorageHelper.uploadSingleFile(file, cloudPath);
            f.value.avatar = result.fileID;
            const tempUrl = await CloudStorageHelper.getSingleTempURL(result.fileID);
            f.value.avatarDisplay = tempUrl;
          } catch (error) {
            TDesign.MessagePlugin.error('头像上传失败：' + error.message);
          } finally {
            avatarUploading.value = false;
            e.target.value = '';
          }
        };
        const removeAvatar = () => { f.value.avatar = ''; f.value.avatarDisplay = ''; };

        const ld = async () => {
          lg.value = true;
          try {
            const data = await AdminAPI.getAdminUserList({ page: pg.value.current, page_size: pg.value.pageSize, keyword: k.value });
            d.value = data.list;
            pg.value.total = data.total;
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
          finally { lg.value = false; }
        };
        const rs = () => { k.value = ''; ld(); };
        const chg = pi => { pg.value.current = pi.current; pg.value.pageSize = pi.pageSize; ld(); };

        const add = () => { m.value = 'add'; f.value = { role: 'normal', avatar: '', avatarDisplay: '' }; v.value = true; };

        const edit = async (row) => {
          m.value = 'edit';
          f.value = { ...row, avatar: row.avatar || '', avatarDisplay: '' };
          v.value = true;
          if (row.avatar) {
            try {
              const tempUrl = await CloudStorageHelper.getSingleTempURL(row.avatar);
              f.value.avatarDisplay = tempUrl;
            } catch (e) { console.error('获取头像URL失败', e); }
          }
        };

        const toggle = async (row) => {
          try { await AdminAPI.toggleAdminStatus({ adminId: row.id }); TDesign.MessagePlugin.success('操作成功'); ld(); }
          catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        const del = async (row) => {
          try { await AdminAPI.deleteAdmin({ adminId: row.id }); TDesign.MessagePlugin.success('删除成功'); ld(); }
          catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        const save = async () => {
          try {
            const payload = { ...f.value };
            delete payload.avatarDisplay;
            if (m.value === 'add') await AdminAPI.createAdmin(payload);
            else await AdminAPI.updateAdmin(payload);
            TDesign.MessagePlugin.success('保存成功');
            v.value = false; ld();
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        onMounted(ld);
        return {
          activeMenuKey: 'admin-list',adminInfo, handleMenuChange, handleLogout,
          lg, d, v, m, f, k, pg, roleOpts, cols, rules,
          ld, rs, chg, add, edit, toggle, del, save,
          avatarFileInput, avatarUploading, triggerAvatarUpload, handleAvatarChange, removeAvatar
        };}}).use(TDesign).component('sidebar-menu', SidebarNavigation.SidebarMenu).mount('#app');</script></body></html>
