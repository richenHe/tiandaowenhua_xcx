<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>案例管理</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><link rel="stylesheet" href="../../assets/css/tokens.css"><style>body{margin:0;padding:20px;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.page-container{max-width:1400px;margin:0 auto;background:white;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.page-header{margin-bottom:24px}.page-title{font-size:20px;font-weight:600;color:#333;margin:0 0 8px 0}.page-desc{font-size:14px;color:#999;margin:0}.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    /* 云存储上传组件样式 */
    .upload-placeholder{width:200px;height:200px;border:2px dashed #dcdcdc;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;}
    .upload-placeholder:hover{border-color:#0052d9;background:#f3f3f3;}
    .small-placeholder{width:100px;height:100px;}
    .image-preview{position:relative;width:200px;}
    .small-preview{width:100px;}
    .image-preview img{width:100%;height:200px;object-fit:cover;border-radius:4px;border:1px solid #dcdcdc;}
    .small-preview img{height:100px;}
    .image-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
    .upload-tips{margin-top:6px;font-size:12px;color:#999;}
    .video-preview{width:100%;}
    .multi-upload-container{width:100%;}
    .multi-images-preview{display:flex;flex-wrap:wrap;gap:8px;}
    .thumb-item{position:relative;width:80px;height:80px;}
    .thumb-item img{width:100%;height:100%;object-fit:cover;border-radius:4px;border:1px solid #dcdcdc;}
    .thumb-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#f00;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;line-height:1;}
    .thumb-add{width:80px;height:80px;}
    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }

  </style></head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="case-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="page-container"><div class="page-header"><h1 class="page-title">案例管理</h1><p class="page-desc">管理课程案例，展示学员成果</p></div><t-form layout="inline" style="margin-bottom:20px;background:white;padding:16px;border-radius:8px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;"><t-form-item><t-input v-model="filters.keyword" placeholder="案例标题" clearable style="width:200px;"/></t-form-item><t-form-item><t-select v-model="filters.courseId" :options="courseOptions" placeholder="关联课程" clearable style="width:200px;"/></t-form-item><t-form-item><t-space><t-button theme="primary" @click="handleSearch">查询</t-button><t-button theme="default" @click="handleReset">重置</t-button><t-button theme="success" @click="handleAdd">新增案例</t-button></t-space></t-form-item></t-form><t-table :data="tableData" :columns="columns" :loading="loading" :pagination="pagination" @page-change="handlePageChange" row-key="id" bordered stripe hover><template #cover="{ row }"><t-image v-if="row.student_avatar" :src="row.student_avatar" style="width:80px;height:60px;border-radius:4px;" fit="cover"></t-image><span v-else style="color:#999;font-size:12px;">无图片</span></template><template #status="{ row }"><t-tag v-if="row.status===1" theme="success">显示</t-tag><t-tag v-else theme="default">隐藏</t-tag></template><template #operation="{ row }"><t-space size="small"><t-button theme="primary" size="small" variant="text" @click="handleEdit(row)">编辑</t-button><t-button :theme="row.status===1?'warning':'success'" size="small" variant="text" @click="handleToggleStatus(row)">{{row.status===1?'隐藏':'显示'}}</t-button><t-button theme="danger" size="small" variant="text" @click="handleDelete(row)">删除</t-button></t-space></template></t-table></div><t-dialog v-model:visible="formVisible" :header="formMode==='add'?'新增案例':'编辑案例'" width="700px" @confirm="handleSubmit">
  <t-form ref="form" :data="formData" :rules="rules" label-width="100px">
    <t-form-item label="案例标题" name="title"><t-input v-model="formData.title" placeholder="请输入案例标题"/></t-form-item>
    <t-form-item label="学员姓名" name="studentName"><t-input v-model="formData.studentName" placeholder="请输入学员姓名"/></t-form-item>
    <t-form-item label="学员头衔" name="studentTitle"><t-input v-model="formData.studentTitle" placeholder="请输入学员头衔/职业"/></t-form-item>

    <!-- 学员头像 - 云存储单图上传 -->
    <t-form-item label="学员头像" name="studentAvatar">
      <cloud-image-upload
        v-model="formData.studentAvatarURL"
        v-model:file-id="formData.studentAvatar"
        path-prefix="academy/cases/avatars"
        :item-id="formData.id || 'new'"
        :max-size="2 * 1024 * 1024"
        tips="建议 1:1 正方形，支持 JPG/PNG，不超过 2MB"
        :width="160"
        :height="160"
      />
    </t-form-item>

    <!-- 案例视频 - 云存储视频上传 -->
    <t-form-item label="案例视频" name="videoUrl">
      <input type="file" ref="videoFileInput" accept="video/*" @change="handleVideoChange" style="display:none;">
      <div v-if="!formData.videoUrl" class="upload-placeholder" @click="triggerVideoUpload">
        <t-icon name="video" style="font-size:32px;color:#999;margin-bottom:8px;"/><p style="margin:0;color:#999;font-size:14px;">点击上传视频</p>
      </div>
      <div v-else class="video-preview">
        <video :src="formData.videoUrlDisplay || formData.videoUrl" controls style="width:100%;max-height:180px;border-radius:4px;"></video>
        <div class="image-actions">
          <t-button size="small" variant="outline" @click="triggerVideoUpload" :loading="videoUploading">更换视频</t-button>
          <t-button size="small" theme="danger" variant="outline" @click="removeVideo">删除</t-button>
        </div>
      </div>
      <p class="upload-tips">支持 MP4/MOV，不超过 100MB</p>
    </t-form-item>

    <!-- 案例图片 - 云存储多图上传 -->
    <t-form-item label="案例图片" name="images">
      <input type="file" ref="imagesFileInput" accept="image/*" multiple @change="handleImagesChange" style="display:none;">
      <div class="multi-upload-container">
        <div class="multi-images-preview">
          <div v-for="(img, idx) in formData.imagesDisplay" :key="idx" class="thumb-item">
            <img :src="img.url" alt="图片">
            <span class="thumb-remove" @click="removeImageItem(idx)">×</span>
          </div>
          <div v-if="formData.imagesDisplay.length < 9" class="upload-placeholder thumb-add" @click="triggerImagesUpload">
            <t-icon name="add" style="font-size:24px;color:#999;"/>
          </div>
        </div>
        <p class="upload-tips" v-if="imagesUploading">上传中...</p>
        <p class="upload-tips">可多选，最多9张，支持 JPG/PNG，每张不超过 5MB</p>
      </div>
    </t-form-item>

    <t-form-item label="关联课程" name="courseId"><t-select v-model="formData.courseId" :options="courseOptions" placeholder="选择课程"/></t-form-item>
    <t-form-item label="案例摘要" name="summary"><t-textarea v-model="formData.summary" placeholder="请输入案例摘要" :maxlength="500" :autosize="{minRows:4,maxRows:8}"/></t-form-item>
    <t-form-item label="案例内容" name="content"><t-textarea v-model="formData.content" placeholder="请输入详细内容" :maxlength="5000" :autosize="{minRows:6,maxRows:12}"/></t-form-item>
    <t-form-item label="排序" name="sortOrder"><t-input-number v-model="formData.sortOrder" :min="0" style="width:100%;"/></t-form-item>
    <t-form-item label="显示状态" name="status">
      <t-radio-group v-model="formData.status"><t-radio :value="1">显示</t-radio><t-radio :value="0">隐藏</t-radio></t-radio-group>
    </t-form-item>
  </t-form>
</t-dialog>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/cloudbase.js"></script>
  <script src="../../assets/js/cloud-storage-helper.js"></script>
  <script src="../../assets/js/admin-api.js"></script>
  <script src="../../assets/js/sidebar-navigation.js"></script>
  
  <script>
    const { createApp, ref, onMounted } = Vue;
    
    createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        
        const loading = ref(false);
        const tableData = ref([]);
        const formVisible = ref(false);
        const formMode = ref('add');
        const formData = ref({
          status: 1,
          studentAvatar: '', studentAvatarURL: '',
          videoUrl: '', videoUrlDisplay: '',
          images: [], imagesDisplay: []
        });
        const filters = ref({ keyword: '', courseId: null });
        const courseOptions = ref([]);
        const pagination = ref({ current: 1, pageSize: 20, total: 0 });
        
        const columns = [
          // DB 返回 student_avatar 字段，表格 slot 名沿用 'cover' 方便模板识别
          { colKey: 'student_avatar', title: '头像', width: 100, cell: 'cover' },
          { colKey: 'title', title: '案例标题', width: 200 },
          { colKey: 'student_name', title: '学员姓名', width: 120 },
          { colKey: 'course_name', title: '关联课程', width: 150 },
          { colKey: 'summary', title: '摘要', ellipsis: true },
          { colKey: 'created_at', title: '创建时间', width: 160 },
          { colKey: 'status', title: '状态', width: 80, cell: 'status' },
          { colKey: 'operation', title: '操作', width: 200, fixed: 'right', cell: 'operation' }
        ];
        
        // 表单验证规则，name 与表单字段 camelCase 保持一致
        const rules = {
          title: [{ required: true, message: '请输入案例标题', type: 'error' }],
          studentName: [{ required: true, message: '请输入学员姓名', type: 'error' }],
          studentAvatar: [{ required: true, message: '请输入学员头像URL', type: 'error' }],
          courseId: [{ required: true, message: '请选择关联课程', type: 'error' }],
          summary: [{ required: true, message: '请输入案例摘要', type: 'error' }]
        };
        
        const fetchData = async () => {
          loading.value = true;
          try {
            const params = {
              page: pagination.value.current,
              pageSize: pagination.value.pageSize,
              ...filters.value
            };
            const data = await AdminAPI.getCaseList(params);
            tableData.value = data.list;
            pagination.value.total = data.total;
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '获取数据失败');
          } finally {
            loading.value = false;
          }
        };
        
        const fetchCourses = async () => {
          try {
            const data = await AdminAPI.getAllCourses();
            courseOptions.value = data.map(c => ({ label: c.name, value: c.id }));
          } catch (error) {
            console.error('获取课程列表失败', error);
          }
        };
        
        const handleSearch = () => {
          pagination.value.current = 1;
          fetchData();
        };
        
        const handleReset = () => {
          filters.value = { keyword: '', courseId: null };
          handleSearch();
        };
        
        const handlePageChange = (pageInfo) => {
          pagination.value.current = pageInfo.current;
          pagination.value.pageSize = pageInfo.pageSize;
          fetchData();
        };
        
        // 云存储上传相关 refs（视频、多图保留原有逻辑）
        const videoFileInput = ref(null);
        const imagesFileInput = ref(null);
        const videoUploading = ref(false);
        const imagesUploading = ref(false);

        // 视频上传
        const triggerVideoUpload = () => videoFileInput.value?.click();
        const handleVideoChange = async (e) => {
          const file = e.target.files[0]; if (!file) return;
          const v = window.CloudStorageHelper.validateFile(file, { acceptTypes: ['video/*'], maxSize: 100*1024*1024 });
          if (!v.valid) { TDesign.MessagePlugin.error(v.error); return; }
          try {
            videoUploading.value = true;
            const id = formData.value.id || Date.now();
            const ext = file.name.split('.').pop();
            const r = await window.CloudStorageHelper.uploadSingleFile(file, `academy/cases/videos/${id}_${Date.now()}.${ext}`);
            formData.value.videoUrl = r.fileID;
            formData.value.videoUrlDisplay = r.tempFileURL;
            TDesign.MessagePlugin.success('视频上传成功');
          } catch (err) { TDesign.MessagePlugin.error('上传失败：' + err.message); }
          finally { videoUploading.value = false; e.target.value = ''; }
        };
        const removeVideo = () => { formData.value.videoUrl = ''; formData.value.videoUrlDisplay = ''; };

        // 多图上传
        const triggerImagesUpload = () => imagesFileInput.value?.click();
        const handleImagesChange = async (e) => {
          const files = Array.from(e.target.files); if (!files.length) return;
          const remaining = 9 - (formData.value.imagesDisplay?.length || 0);
          const toUpload = files.slice(0, remaining);
          try {
            imagesUploading.value = true;
            const id = formData.value.id || Date.now();
            for (const file of toUpload) {
              const v = window.CloudStorageHelper.validateFile(file, { acceptTypes: ['image/*'], maxSize: 5*1024*1024 });
              if (!v.valid) { TDesign.MessagePlugin.warning(file.name + '：' + v.error); continue; }
              const ext = file.name.split('.').pop();
              const r = await window.CloudStorageHelper.uploadSingleFile(file, `academy/cases/images/${id}/${Date.now()}.${ext}`);
              formData.value.imagesDisplay.push({ fileID: r.fileID, url: r.tempFileURL });
              formData.value.images.push(r.fileID);
            }
            TDesign.MessagePlugin.success('图片上传成功');
          } catch (err) { TDesign.MessagePlugin.error('上传失败：' + err.message); }
          finally { imagesUploading.value = false; e.target.value = ''; }
        };
        const removeImageItem = (idx) => {
          formData.value.imagesDisplay.splice(idx, 1);
          formData.value.images.splice(idx, 1);
        };

        const handleAdd = () => {
          formMode.value = 'add';
          formData.value = {
            status: 1,
            studentAvatar: '', studentAvatarURL: '',
            videoUrl: '', videoUrlDisplay: '',
            images: [], imagesDisplay: []
          };
          formVisible.value = true;
        };
        
        const handleEdit = async (row) => {
          formMode.value = 'edit';
          const imagesArr = Array.isArray(row.images) ? row.images : (row.images ? JSON.parse(row.images) : []);
          formData.value = {
            id: row.id,
            title: row.title,
            studentName: row.student_name,
            studentTitle: row.student_title,
            studentAvatar: row.student_avatar || '',
            studentAvatarURL: '',
            videoUrl: row.video_url || '',
            videoUrlDisplay: '',
            images: [...imagesArr],
            imagesDisplay: [],
            courseId: row.course_id,
            summary: row.summary,
            content: row.content,
            sortOrder: row.sort_order,
            status: row.status
          };
          // 转换云存储 fileID 为临时 URL
          if (row.student_avatar) {
            try { formData.value.studentAvatarURL = await window.CloudStorageHelper.getSingleTempURL(row.student_avatar); }
            catch (e) { console.warn('获取头像URL失败', e); }
          }
          if (row.video_url) {
            try { formData.value.videoUrlDisplay = await window.CloudStorageHelper.getSingleTempURL(row.video_url); }
            catch (e) { console.warn('获取视频URL失败', e); }
          }
          if (imagesArr.length) {
            try {
              const urls = await window.CloudStorageHelper.getBatchTempURLs(imagesArr);
              formData.value.imagesDisplay = imagesArr.map((fileID, i) => ({ fileID, url: urls[i] || '' }));
            } catch (e) { console.warn('获取图片URLs失败', e); }
          }
          formVisible.value = true;
        };
        
        const handleDelete = async (row) => {
          const confirmed = await TDesign.DialogPlugin.confirm({
            header: '确认删除',
            body: '确认删除该案例吗？',
            theme: 'warning'
          });
          if (!confirmed) return;
          
          try {
            await AdminAPI.deleteCase({ caseId: row.id });
            TDesign.MessagePlugin.success('删除成功');
            fetchData();
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '删除失败');
          }
        };
        
        const handleToggleStatus = async (row) => {
          try {
            await AdminAPI.updateCaseStatus({
              caseId: row.id,
              status: row.status === 1 ? 0 : 1
            });
            TDesign.MessagePlugin.success('状态已更新');
            fetchData();
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '操作失败');
          }
        };
        
        const handleSubmit = async () => {
          try {
            // 提交时 images 字段传 fileID 数组（JSON），云函数存入 DB
            const payload = {
              ...formData.value,
              images: formData.value.images
            };
            // 删除仅用于显示的字段
            delete payload.studentAvatarURL;
            delete payload.videoUrlDisplay;
            delete payload.imagesDisplay;
            if (formMode.value === 'add') {
              await AdminAPI.createCase(payload);
            } else {
              await AdminAPI.updateCase(payload);
            }
            TDesign.MessagePlugin.success('保存成功');
            formVisible.value = false;
            fetchData();
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '保存失败');
          }
        };
        
        onMounted(() => {
          fetchData();
          fetchCourses();
        });
        
        return {
          activeMenuKey: 'case-list',// 侧边栏导航
          adminInfo, handleMenuChange, handleLogout,
          // 页面功能
          loading, tableData, formVisible, formMode, formData,
          filters, courseOptions, pagination, columns, rules,
          handleSearch, handleReset, handlePageChange,
          handleAdd, handleEdit, handleDelete, handleToggleStatus, handleSubmit,
          // 云存储上传（视频、多图）
          videoFileInput, imagesFileInput,
          videoUploading, imagesUploading,
          triggerVideoUpload, handleVideoChange, removeVideo,
          triggerImagesUpload, handleImagesChange, removeImageItem
        };
      }
    }).use(TDesign)
      .component('sidebar-menu', SidebarNavigation.SidebarMenu)
      .component('cloud-image-upload', CloudUploadComponents.CloudImageUpload)
      .mount('#app');
  </script>
</body>
</html>
