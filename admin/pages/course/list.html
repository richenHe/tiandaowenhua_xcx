<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程列表 - 天道文化后台</title>
  
  <!-- TDesign CSS（本地）-->
  <link rel="stylesheet" href="../../assets/libs/tdesign.min.css">
  <link rel="stylesheet" href="../../assets/css/tokens.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    .page-content {
      height: 100%;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 24px;
    }
    
    .page-header {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .page-title {
      font-size: 20px;
      font-weight: 600;
    }
    
    .search-form {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .table-card {
      background: white;
      border-radius: 8px;
      padding: 24px;
    }
    
    .type-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    
    .type-initial { background: #e3f2fd; color: #1976d2; }
    .type-intensive { background: #fce4ec; color: #c2185b; }
    .type-consultation { background: #f3e5f5; color: #7b1fa2; }
    
    .status-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    
    .status-active { background: #e8f5e9; color: #388e3c; }
    .status-inactive { background: #cfd8dc; color: #546e7a; }
    
    .course-image {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
    }

    /* 云存储上传组件样式 */
    .upload-container { margin-bottom: 8px; }
    .upload-placeholder {
      width: 200px; height: 200px;
      border: 2px dashed #dcdcdc; border-radius: 4px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s;
    }
    .upload-placeholder:hover { border-color: #0052d9; background: #f3f3f3; }
    .image-preview { position: relative; width: 200px; }
    .image-preview img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; border: 1px solid #dcdcdc; }
    .image-actions { margin-top: 8px; display: flex; gap: 8px; }
    .upload-tips { margin-top: 6px; font-size: 12px; color: #999; }

    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }

  </style>
</head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="course-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1 class="page-title">课程列表</h1>
      <t-space>
        <t-button theme="primary" @click="showAddDialog">新增课程</t-button>
        
      </t-space>
    </div>

    <!-- 搜索表单 -->
    <div class="search-form">
      <t-form :data="searchForm" layout="inline" @submit="handleSearch" @reset="handleReset">
        <t-form-item label="课程名称" name="name">
          <t-input v-model="searchForm.name" placeholder="请输入课程名称" />
        </t-form-item>
        
        <!-- courses.type: 1初探班/2密训班/3咨询服务/4沙龙 -->
        <t-form-item label="课程类型" name="type">
          <t-select v-model="searchForm.type" placeholder="请选择课程类型" clearable>
            <t-option :value="1" label="初探班"></t-option>
            <t-option :value="2" label="密训班"></t-option>
            <t-option :value="3" label="咨询服务"></t-option>
            <t-option :value="4" label="沙龙"></t-option>
          </t-select>
        </t-form-item>

        <!-- courses.status: 0下架/1上架 -->
        <t-form-item label="状态" name="status">
          <t-select v-model="searchForm.status" placeholder="请选择状态" clearable>
            <t-option :value="1" label="上架"></t-option>
            <t-option :value="0" label="下架"></t-option>
          </t-select>
        </t-form-item>
        
        <t-form-item>
          <t-button theme="primary" type="submit">查询</t-button>
          <t-button theme="default" type="reset">重置</t-button>
        </t-form-item>
      </t-form>
    </div>

    <!-- 数据表格 -->
    <div class="table-card">
      <t-table 
        :data="courses" 
        :columns="columns" 
        :loading="loading"
        :pagination="pagination"
        row-key="id"
        @page-change="handlePageChange"
      >
        <!-- 课程图片 -->
        <template #cover_image="{ row }">
          <img
            v-if="row.cover_image"
            :src="row.cover_image"
            class="course-image"
            :alt="row.name"
          />
          <span v-else>-</span>
        </template>
        
        <!-- 课程类型 -->
        <template #type="{ row }">
          <span :class="['type-tag', getTypeClass(row.type)]">
            {{ getTypeText(row.type) }}
          </span>
        </template>
        
        <!-- 状态 -->
        <template #status="{ row }">
          <span :class="['status-tag', row.status === 1 ? 'status-active' : 'status-inactive']">
            {{ row.status === 1 ? '上架' : '下架' }}
          </span>
        </template>
        
        <!-- 操作列 -->
        <template #operation="{ row }">
          <t-space>
            <t-link theme="primary" @click="editCourse(row)">编辑</t-link>
            <t-link 
              :theme="row.status === 1 ? 'warning' : 'success'" 
              @click="toggleStatus(row)"
            >
              {{ row.status === 1 ? '下架' : '上架' }}
            </t-link>
            <t-link theme="danger" @click="deleteCourse(row)">删除</t-link>
          </t-space>
        </template>
      </t-table>
    </div>

    <!-- 新增/编辑课程对话框 -->
    <t-dialog 
      v-model:visible="editDialogVisible" 
      :header="editMode === 'add' ? '新增课程' : '编辑课程'" 
      width="800px"
      @confirm="handleSave"
    >
      <t-form :data="editForm" ref="editFormRef" label-width="120px">
        <t-form-item label="课程名称" name="name" :rules="[{ required: true, message: '请输入课程名称' }]">
          <t-input v-model="editForm.name" placeholder="请输入课程名称" />
        </t-form-item>
        
        <!-- 所有字段使用 camelCase，云函数负责转换为 snake_case 存入 DB -->
        <!-- courses.type: 1初探班/2密训班/3咨询服务/4沙龙 -->
        <t-form-item label="课程类型" name="type" :rules="[{ required: true, message: '请选择课程类型' }]">
          <t-select v-model="editForm.type" placeholder="请选择课程类型">
            <t-option :value="1" label="初探班"></t-option>
            <t-option :value="2" label="密训班"></t-option>
            <t-option :value="3" label="咨询服务"></t-option>
            <t-option :value="4" label="沙龙"></t-option>
          </t-select>
        </t-form-item>
        
        <t-form-item label="课程封面" name="coverImage">
          <cloud-image-upload
            v-model="editForm.coverImageURL"
            v-model:file-id="editForm.coverImage"
            path-prefix="courses/covers"
            :item-id="editForm.id || 'new'"
            :max-size="3 * 1024 * 1024"
            tips="建议尺寸 750×400，支持 JPG/PNG，不超过 3MB"
            :width="320"
            :height="160"
          />
        </t-form-item>
        
        <t-form-item label="现价（元）" name="currentPrice" :rules="[{ required: true, message: '请输入课程现价' }]">
          <t-input-number v-model="editForm.currentPrice" :min="0" :step="0.01" style="width:100%;" />
        </t-form-item>
        
        <t-form-item label="原价（元）" name="originalPrice">
          <t-input-number v-model="editForm.originalPrice" :min="0" :step="0.01" style="width:100%;" />
        </t-form-item>
        
        <t-form-item label="重训价（元）" name="retrainPrice">
          <t-input-number v-model="editForm.retrainPrice" :min="0" :step="0.01" style="width:100%;" />
        </t-form-item>
        
        <t-form-item label="课程时长" name="duration">
          <t-input v-model="editForm.duration" placeholder="例如：3天2夜" />
        </t-form-item>
        
        <t-form-item label="课程简介" name="description">
          <t-textarea v-model="editForm.description" placeholder="请输入课程简介" :maxlength="500" />
        </t-form-item>
        
        <t-form-item label="课程详情" name="content">
          <t-textarea v-model="editForm.content" placeholder="请输入课程详细内容" :maxlength="5000" />
        </t-form-item>
        
        <t-form-item label="讲师" name="teacher">
          <t-input v-model="editForm.teacher" placeholder="请输入讲师姓名" />
        </t-form-item>
        
        <t-form-item label="排序" name="sortOrder">
          <t-input-number v-model="editForm.sortOrder" :min="0" />
        </t-form-item>
        
        <t-form-item label="状态" name="status">
          <t-switch v-model="editForm.status" :true-value="1" :false-value="0" />
          <span style="margin-left: 8px;">{{ editForm.status === 1 ? '上架' : '下架' }}</span>
        </t-form-item>
      </t-form>
    </t-dialog>
  </div>

  <!-- Vue 3 -->
  <script src="../../assets/libs/vue.global.js"></script>
  <!-- TDesign -->
  <script src="../../assets/libs/tdesign.min.js"></script>
  <!-- CloudBase SDK & 云存储 -->
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <!-- 配置 -->
  <script src="../../assets/js/config.js?v=20260227"></script>
  <script src="../../assets/js/cloudbase.js?v=20260227"></script>
  <script src="../../assets/js/cloud-storage-helper.js"></script>
  <!-- API 封装 -->
  <script src="../../assets/js/admin-api.js?v=20260227f"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260227ddc"></script>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        // 管理员信息
        const adminInfo = ref(null);
        
        // 检查登录状态
        const checkAuth = () => {
          adminInfo.value = AdminAPI.getCurrentAdmin();
          if (!adminInfo.value) {
            window.location.href = '../../index.html';
            return false;
          }
          return true;
        };
        
        // 退出登录
        const handleLogout = () => {
          AdminAPI.logout();
        };
        
        // 菜单切换
        const handleMenuChange = (value) => {
          const routes = {
            'dashboard': '../../dashboard.html',
            'user-list': '../user/list.html',
            'user-referee': '../user/referee.html',
            'user-referee-logs': '../user/referee-logs.html',
            'order-list': '../order/list.html',
            'order-refund': '../order/refund.html',
            'withdraw-audit': '../order/withdraw-audit.html',
            'mall-goods': '../order/mall-goods.html',
            'course-list': '../course/list.html',
            'schedule-list': '../course/schedule.html',
            'appointment-list': '../course/appointment.html',
            'case-list': '../course/case.html',
            'material-list': '../course/material.html',
            'ambassador-list': '../ambassador/list.html',
            'application-audit': '../ambassador/application-audit.html',
            'activity-list': '../ambassador/activity.html',
            'contract-list': '../ambassador/contract.html',
            'admin-list': '../system/admin.html',
            'config': '../system/config.html',
            'announcement-list': '../system/announcement.html',
            'feedback-list': '../system/feedback.html',
            'notification-list': '../system/notification.html',
            'level-config': '../system/level-config.html',
          };
          
          if (routes[value]) {
            window.location.href = routes[value];
          }
        };
        
        
        const loading = ref(false);
        const courses = ref([]);
        const searchForm = reactive({
          name: '',
          type: '',
          status: ''
        });
        
        const pagination = reactive({
          current: 1,
          pageSize: CONFIG.PAGE_SIZE,
          total: 0
        });

        const editDialogVisible = ref(false);
        const editMode = ref('add');
        const editFormRef = ref(null);
        // editForm 所有字段使用 camelCase，云函数负责转换为 snake_case
        const editForm = reactive({
          id: null,
          name: '',
          type: null,
          coverImage: '',      // 云存储 fileID，提交给云函数
          coverImageURL: '',   // 临时 URL，仅用于显示预览
          currentPrice: 0,
          originalPrice: 0,
          retrainPrice: 0,
          duration: '',
          description: '',
          content: '',
          outline: '',
          teacher: '',
          sortOrder: 0,
          status: 1
        });


        // 表格列配置
        const columns = [
          { colKey: 'id', title: 'ID', width: 80 },
          { colKey: 'cover_image', title: '课程图片', width: 100 },
          { colKey: 'name', title: '课程名称', width: 150 },
          { colKey: 'nickname', title: '课程昵称', width: 120 },
          { colKey: 'type', title: '课程类型', width: 100 },
          { colKey: 'current_price', title: '现价（元）', width: 100 },
          { colKey: 'original_price', title: '原价（元）', width: 100 },
          { colKey: 'duration', title: '课程时长', width: 100 },
          { colKey: 'sold_count', title: '已售', width: 80 },
          { colKey: 'sort_order', title: '排序', width: 80 },
          { colKey: 'status', title: '状态', width: 80 },
          { colKey: 'created_at', title: '创建时间', width: 160 },
          { colKey: 'operation', title: '操作', width: 200, fixed: 'right' }
        ];

        // 获取课程列表
        const fetchCourses = async () => {
          loading.value = true;
          try {
            const params = {
              page: pagination.current,
              pageSize: pagination.pageSize,
              ...searchForm
            };

            const data = await AdminAPI.getCourseList(params);
            courses.value = data.list || [];
            pagination.total = data.total || 0;
          } catch (error) {
            console.error('获取课程列表失败:', error);
            TDesign.MessagePlugin.error('获取课程列表失败: ' + error.message);
          } finally {
            loading.value = false;
          }
        };

        // 搜索
        const handleSearch = () => {
          pagination.current = 1;
          fetchCourses();
        };

        // 重置
        const handleReset = () => {
          Object.assign(searchForm, {
            name: '',
            type: '',
            status: ''
          });
          handleSearch();
        };

        // 分页变化
        const handlePageChange = (pageInfo) => {
          pagination.current = pageInfo.current;
          pagination.pageSize = pageInfo.pageSize;
          fetchCourses();
        };

        // 显示新增对话框
        const showAddDialog = () => {
          editMode.value = 'add';
          Object.assign(editForm, {
            id: null,
            name: '',
            type: null,
            coverImage: '',
            coverImageURL: '',
            currentPrice: 0,
            originalPrice: 0,
            retrainPrice: 0,
            duration: '',
            description: '',
            content: '',
            outline: '',
            teacher: '',
            sortOrder: 0,
            status: 1
          });
          editDialogVisible.value = true;
        };

        // 编辑课程
        const editCourse = async (course) => {
          editMode.value = 'edit';
          Object.assign(editForm, {
            id: course.id,
            name: course.name,
            nickname: course.nickname || '',
            type: course.type,
            coverImage: course.cover_image || '',
            coverImageURL: '',
            originalPrice: course.original_price,
            currentPrice: course.current_price,
            retrainPrice: course.retrain_price,
            duration: course.duration,
            description: course.description,
            content: course.content,
            outline: course.outline,
            teacher: course.teacher,
            sortOrder: course.sort_order,
            status: course.status
          });
          // 将 fileID 转为临时 URL 用于预览
          if (course.cover_image) {
            try {
              editForm.coverImageURL = await window.CloudStorageHelper.getSingleTempURL(course.cover_image);
            } catch (e) { console.warn('获取封面临时URL失败', e); }
          }
          editDialogVisible.value = true;
        };

        // 保存课程，所有参数使用 camelCase，云函数负责转换
        const handleSave = async () => {
          try {
            const params = {
              name: editForm.name,
              type: editForm.type,
              coverImage: editForm.coverImage,
              currentPrice: editForm.currentPrice,
              originalPrice: editForm.originalPrice,
              retrainPrice: editForm.retrainPrice,
              duration: editForm.duration,
              description: editForm.description,
              content: editForm.content,
              outline: editForm.outline,
              teacher: editForm.teacher,
              sortOrder: editForm.sortOrder,
              status: editForm.status
            };

            if (editMode.value === 'add') {
              await AdminAPI.createCourse(params);
              TDesign.MessagePlugin.success('课程创建成功');
            } else {
              // 更新时传 id（云函数 updateCourse 用 id 查询）
              params.id = editForm.id;
              await AdminAPI.updateCourse(params);
              TDesign.MessagePlugin.success('课程更新成功');
            }

            editDialogVisible.value = false;
            fetchCourses();
          } catch (error) {
            TDesign.MessagePlugin.error('保存失败: ' + error.message);
          }
        };

        // 切换状态
        const toggleStatus = async (course) => {
          try {
            await AdminAPI.updateCourse({
              id: course.id,
              status: course.status === 1 ? 0 : 1
            });
            TDesign.MessagePlugin.success('状态更新成功');
            fetchCourses();
          } catch (error) {
            TDesign.MessagePlugin.error('状态更新失败: ' + error.message);
          }
        };

        // 删除课程
        const deleteCourse = async (course) => {
          try {
            await AdminAPI.deleteCourse({ id: course.id });
            TDesign.MessagePlugin.success('课程删除成功');
            fetchCourses();
          } catch (error) {
            TDesign.MessagePlugin.error('删除失败: ' + error.message);
          }
        };

        // 获取类型文本（DB type 为整数）
        const getTypeText = (type) => {
          const typeMap = { 1: '初探班', 2: '密训班', 3: '咨询服务', 4: '沙龙' };
          return typeMap[type] || String(type);
        };

        // 获取类型样式类（DB type 为整数）
        const getTypeClass = (type) => {
          const classMap = { 1: 'type-initial', 2: 'type-intensive', 3: 'type-consultation' };
          return classMap[type] || '';
        };

        // 返回上一页
        

        onMounted(() => {
          if (checkAuth()) {
          fetchCourses();
        }
        });

        return {
          activeMenuKey: 'course-list',adminInfo,
          handleLogout,
          handleMenuChange,
          loading,
          courses,
          searchForm,
          pagination,
          columns,
          editDialogVisible,
          editMode,
          editFormRef,
          editForm,
          handleSearch,
          handleReset,
          handlePageChange,
          showAddDialog,
          editCourse,
          handleSave,
          toggleStatus,
          deleteCourse,
          getTypeText,
          getTypeClass,
          };
      }
    }).use(TDesign)
      .component('sidebar-menu', SidebarNavigation.SidebarMenu)
      .component('cloud-image-upload', CloudUploadComponents.CloudImageUpload)
      .mount('#app');
  </script>
</body>
</html>
