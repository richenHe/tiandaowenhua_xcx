<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程列表 - 天道文化后台</title>
  
  <!-- TDesign CSS（本地）-->
  <link rel="stylesheet" href="../../assets/libs/tdesign.min.css">
  <link rel="stylesheet" href="../../assets/css/tokens.css?v=20260402">
  
  <style>
    .type-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    .type-initial { background: #e3f2fd; color: #1976d2; }
    .type-intensive { background: #fce4ec; color: #c2185b; }
    .type-consultation { background: #f3e5f5; color: #7b1fa2; }
    .type-salon { background: #fff3e0; color: #e65100; }

    .status-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    .status-active { background: #e8f5e9; color: #388e3c; }
    .status-inactive { background: #cfd8dc; color: #546e7a; }

    .course-image {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
    }

    .upload-container { margin-bottom: 8px; }
    .upload-placeholder {
      width: 200px; height: 200px;
      border: 2px dashed #dcdcdc; border-radius: 4px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s;
    }
    .upload-placeholder:hover { border-color: #0052d9; background: #f3f3f3; }
    .image-preview { position: relative; width: 200px; }
    .image-preview img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; border: 1px solid #dcdcdc; }
    .image-actions { margin-top: 8px; display: flex; gap: 8px; }
    .upload-tips { margin-top: 6px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="course-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1 class="page-title">课程列表</h1>
      <t-space>
        <t-button theme="primary" @click="showAddDialog">新增课程</t-button>
        
      </t-space>
    </div>

    <!-- 搜索表单 -->
    <div class="search-form">
      <t-form :data="searchForm" layout="inline" @submit="handleSearch" @reset="handleReset">
        <t-form-item label="课程名称" name="keyword">
          <t-input v-model="searchForm.keyword" placeholder="请输入课程名称" />
        </t-form-item>
        
        <!-- courses.type: 1初探班/2密训班/3咨询服务/4沙龙 -->
        <t-form-item label="课程类型" name="type">
          <t-select v-model="searchForm.type" placeholder="请选择课程类型" clearable>
            <t-option :value="1" label="初探班"></t-option>
            <t-option :value="2" label="密训班"></t-option>
            <t-option :value="3" label="咨询服务"></t-option>
            <t-option :value="4" label="沙龙"></t-option>
          </t-select>
        </t-form-item>

        <!-- courses.status: 0下架/1上架 -->
        <t-form-item label="状态" name="status">
          <t-select v-model="searchForm.status" placeholder="请选择状态" clearable>
            <t-option :value="1" label="上架"></t-option>
            <t-option :value="0" label="下架"></t-option>
          </t-select>
        </t-form-item>
        
        <t-form-item>
          <t-button theme="primary" type="submit">查询</t-button>
          <t-button theme="default" type="reset">重置</t-button>
        </t-form-item>
      </t-form>
    </div>

    <!-- 数据表格 -->
    <div class="table-card">
      <t-table 
        :data="courses" 
        :columns="columns" 
        :loading="loading"
        :pagination="pagination"
        row-key="id"
        @page-change="handlePageChange"
      >
        <!-- 课程图片 -->
        <template #cover_image="{ row }">
          <img
            v-if="row.cover_image"
            :src="row.cover_image"
            class="course-image"
            :alt="row.name"
          />
          <span v-else>-</span>
        </template>
        
        <!-- 课程类型 -->
        <template #type="{ row }">
          <span :class="['type-tag', getTypeClass(row.type)]">
            {{ getTypeText(row.type) }}
          </span>
        </template>
        
        <!-- 有效期 -->
        <template #validity_days="{ row }">
          <span v-if="row.validity_days">{{ row.validity_days }}天</span>
          <span v-else style="color:#999;">永久</span>
        </template>

        <!-- 状态 -->
        <template #status="{ row }">
          <span :class="['status-tag', row.status === 1 ? 'status-active' : 'status-inactive']">
            {{ row.status === 1 ? '上架' : '下架' }}
          </span>
        </template>
        
        <!-- 操作列；咨询服务（type=3）暂停编辑 -->
        <template #operation="{ row }">
          <t-space>
            <t-link theme="primary" :disabled="row.type === 3" @click="row.type !== 3 && editCourse(row)">编辑</t-link>
            <t-link v-if="row.type !== 4 && row.need_contract === 1" theme="primary" @click="openCourseContract(row)">合同</t-link>
            <t-link 
              :theme="row.status === 1 ? 'warning' : 'success'" 
              @click="toggleStatus(row)"
            >
              {{ row.status === 1 ? '下架' : '上架' }}
            </t-link>
            <t-link theme="danger" @click="deleteCourse(row)">删除</t-link>
          </t-space>
        </template>
      </t-table>
    </div>

    <!-- 新增/编辑课程对话框 -->
    <t-dialog 
      v-model:visible="editDialogVisible" 
      :header="editMode === 'add' ? '新增课程' : '编辑课程'" 
      width="800px"
      @confirm="handleSave"
    >
      <t-form :data="editForm" ref="editFormRef" label-width="120px">
        <!-- 上架锁定提示 -->
        <t-alert v-if="isCourseLocked" theme="warning" style="margin-bottom:16px;">
          <template #message>课程已上架，所有字段不可修改。如需修改请先下架课程。</template>
        </t-alert>

        <t-form-item label="课程名称" name="name" :rules="[{ required: true, message: '请输入课程名称' }]">
          <t-input v-model="editForm.name" placeholder="请输入课程名称" :disabled="isCourseLocked" />
        </t-form-item>

        <t-form-item label="课程昵称" name="nickname">
          <t-input v-model="editForm.nickname" placeholder="选填，课程简称（如：初探班）" :disabled="isCourseLocked" />
        </t-form-item>
        
        <!-- 所有字段使用 camelCase，云函数负责转换为 snake_case 存入 DB -->
        <!-- courses.type: 1初探班/2密训班/3咨询服务/4沙龙；咨询服务暂停新增/编辑 -->
        <t-form-item label="课程类型" name="type" :rules="[{ required: true, message: '请选择课程类型' }]">
          <t-select v-model="editForm.type" placeholder="请选择课程类型" :disabled="isCourseLocked">
            <t-option :value="1" label="初探班"></t-option>
            <t-option :value="2" label="密训班"></t-option>
            <t-option :value="4" label="沙龙"></t-option>
          </t-select>
        </t-form-item>
        
        <t-form-item label="课程封面" name="coverImage">
          <!-- 须闭合标签：内联 DOM 模板里自定义元素 / 不会自闭合，避免 tips 丢失 -->
          <cloud-image-upload
            v-model="editForm.coverImageURL"
            v-model:file-id="editForm.coverImage"
            path-prefix="courses/covers"
            :item-id="editForm.id || 'new'"
            :max-size="3 * 1024 * 1024"
            tips="建议尺寸 750×420（与小程序课程详情顶图 420rpx 高一致）；首页列表等为缩略区（约 320rpx 高、商城约 280rpx），image 为 aspectFill 会裁边，请把主体放在画面中下部"
            :width="320"
            :height="179"
          ></cloud-image-upload>
        </t-form-item>
        
        <!-- 沙龙课程(type=4)免费，隐藏价格/有效期/时长字段 -->
        <template v-if="editForm.type !== 4">
          <t-form-item label="现价（元）" name="currentPrice" :rules="[{ required: true, message: '请输入课程现价' }]">
            <t-input-number v-model="editForm.currentPrice" :min="0" :step="0.01" style="width:100%;" :disabled="isCourseLocked" />
          </t-form-item>
          
          <t-form-item label="原价（元）" name="originalPrice">
            <t-input-number v-model="editForm.originalPrice" :min="0" :step="0.01" style="width:100%;" :disabled="isCourseLocked" />
          </t-form-item>
          
          <t-form-item label="重训价（元）" name="retrainPrice">
            <t-input-number v-model="editForm.retrainPrice" :min="0" :step="0.01" style="width:100%;" :disabled="isCourseLocked" />
          </t-form-item>

          <!-- courses.validity_days: 必填正整数，单位：天 -->
          <t-form-item label="课程有效期" name="validityDays" :rules="[{ required: true, message: '请输入课程有效期' }, { validator: (val) => Number(val) > 0, message: '有效期必须大于 0 天' }]">
            <div style="display:flex; align-items:center; gap:8px;">
              <t-input-number v-model="editForm.validityDays" :min="1" :max="3650" style="width:160px;" placeholder="必填，如：365" :disabled="isCourseLocked" />
              <span style="color:#666; font-size:13px;">天（例：365 = 1年，730 = 2年）</span>
            </div>
            <div style="font-size:12px; color:#999; margin-top:4px;">
              购课后有效期 = 购课时间 + 有效期天数
            </div>
          </t-form-item>

          <t-form-item label="课程时长" name="duration">
            <t-input v-model="editForm.duration" placeholder="例如：3天2夜" :disabled="isCourseLocked" />
          </t-form-item>

          <t-form-item label="是否需要合同" name="needContract" :rules="[{ required: true, message: '请选择是否需要签订合同' }]">
            <t-radio-group v-model="editForm.needContract" :disabled="isCourseLocked">
              <t-radio :value="1">需要签订合同</t-radio>
              <t-radio :value="0">不需要签订合同</t-radio>
            </t-radio-group>
            <div style="font-size:12px; color:#999; margin-top:4px;">
              需要合同：管理员上传合同后触发课程有效期和推荐奖励<br>
              不需要合同：学员第一次上课后自动触发课程有效期和推荐奖励
            </div>
          </t-form-item>
        </template>

        <!-- 密训班(type=2)专属：赠送课程配置 -->
        <template v-if="editForm.type === 2">
          <t-form-item label="赠送课程">
            <div style="display:flex;flex-direction:column;gap:8px;width:100%;">
              <t-switch v-model="editForm.enableGiftCourse" :disabled="isCourseLocked" />
              <span style="font-size:12px;color:#999;">开启后，购买该密训班将同时赠送绑定的课程</span>
              <t-select
                v-if="editForm.enableGiftCourse"
                v-model="editForm.includedCourseId"
                placeholder="请选择赠送课程"
                :disabled="isCourseLocked"
                :options="publishedCourseOptions.map(c => ({ label: c.name + (c.status === 0 ? '（未上架）' : '') + ' [' + getTypeText(c.type) + ']', value: c.id }))"
                clearable
              />
            </div>
          </t-form-item>
        </template>
        
        <t-form-item label="课程简介" name="description">
          <t-textarea v-model="editForm.description" placeholder="请输入课程简介" :maxlength="500" :disabled="isCourseLocked" />
        </t-form-item>
        
        <t-form-item label="课程详情" name="content">
          <t-textarea v-model="editForm.content" placeholder="请输入课程详细内容" :maxlength="5000" :disabled="isCourseLocked" />
        </t-form-item>

        <t-form-item label="课程大纲" name="outline">
          <t-textarea v-model="editForm.outline" placeholder="每行输入一条大纲内容，例如：&#10;第一讲：天道运行规律&#10;第二讲：因缘际会的哲学" :autosize="{ minRows: 3, maxRows: 8 }" :disabled="isCourseLocked" />
          <div style="font-size:12px; color:#999; margin-top:4px;">每行一条大纲，保存时自动格式化</div>
        </t-form-item>
        
        <t-form-item label="讲师" name="teacher">
          <t-input v-model="editForm.teacher" placeholder="请输入讲师姓名" :disabled="isCourseLocked" />
        </t-form-item>
        
        <t-form-item label="排序" name="sortOrder">
          <t-input-number v-model="editForm.sortOrder" :min="0" :disabled="isCourseLocked" />
        </t-form-item>
        
        <t-form-item label="状态" name="status">
          <t-switch v-model="editForm.status" :true-value="1" :false-value="0" :disabled="isCourseLocked" />
          <span style="margin-left: 8px;">{{ editForm.status === 1 ? '上架' : '下架' }}</span>
        </t-form-item>
      </t-form>
    </t-dialog>

    <!-- 课程学习服务协议弹窗 -->
    <t-dialog
      v-model:visible="contractDialogVisible"
      :header="`${contractCourseRow?.name || ''} — 学习服务协议`"
      width="600px"
      :footer="false"
      @close="contractDialogVisible=false"
    >
      <div v-if="contractCourseRow">
        <div v-if="contractLoading" style="text-align:center;padding:32px;color:#999;">加载中…</div>
        <template v-else>
          <div style="margin-bottom:12px;">
            <div style="font-weight:600;margin-bottom:4px;">协议名称</div>
            <t-input v-model="contractForm.contract_name" placeholder="请输入协议名称，如：初探班学习服务协议"/>
          </div>
          <div style="margin-bottom:16px;">
            <div style="font-weight:600;margin-bottom:8px;">电子合同文件（PDF / Word）</div>
            <div style="font-size:12px;color:#999;margin-bottom:8px;">上传 PDF 或 Word 格式文件，用户签约时会在此文件上附加手写签名。</div>
            <input type="file" ref="contractFileInput" accept=".pdf,.doc,.docx" style="display:none;" @change="handleContractFileChange"/>
            <div style="border:2px dashed #0052d9;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#f8faff;transition:all 0.2s;"
                 @click="triggerContractFileInput">
              <div v-if="contractUploading" style="color:#999;">⏳ 正在上传，请稍候…</div>
              <div v-else>
                <div style="font-size:28px;margin-bottom:4px;">📤</div>
                <div style="color:#0052d9;font-weight:500;">{{ contractForm.contract_file_id ? '重新选择文件' : '点击选择文件' }}</div>
                <div style="font-size:12px;color:#999;margin-top:4px;">支持 .pdf / .doc / .docx 格式</div>
              </div>
            </div>
            <div v-if="contractForm.contract_file_id" style="margin-top:12px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f5;border-radius:6px;">
              <span>📄</span>
              <div style="flex:1;font-size:13px;">{{ contractForm.contract_file_name || '已上传电子合同' }}</div>
              <t-button size="small" @click="previewContractFile">预览</t-button>
            </div>
          </div>
          <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;display:flex;gap:10px;justify-content:flex-end;">
            <t-button theme="default" @click="contractDialogVisible=false">取消</t-button>
            <t-button theme="primary" :loading="contractSaving" @click="saveContract">保存协议</t-button>
          </div>
        </template>
      </div>
    </t-dialog>
  </div>

  <!-- Vue 3 -->
  <script src="../../assets/libs/vue.global.js"></script>
  <!-- TDesign -->
  <script src="../../assets/libs/tdesign.min.js"></script>
  <!-- CloudBase SDK & 云存储 -->
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <!-- 配置 -->
  <script src="../../assets/js/config.js?v=20260402"></script>
  <script src="../../assets/js/cloudbase.js?v=20260402"></script>
  <script src="../../assets/js/cloud-storage-helper.js?v=20260402"></script>
  <!-- API 封装 -->
  <script src="../../assets/js/admin-api.js?v=20260402"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260402"></script>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        // 管理员信息
        const adminInfo = ref(null);
        
        // 检查登录状态
        const checkAuth = () => {
          adminInfo.value = AdminAPI.getCurrentAdmin();
          if (!adminInfo.value) {
            window.location.href = '../../index.html';
            return false;
          }
          return true;
        };
        
        // 退出登录
        const handleLogout = () => {
          AdminAPI.logout();
        };
        
        // 菜单切换
        const handleMenuChange = (value) => {
          const routes = {
            'dashboard': '../../dashboard.html',
            'user-list': '../user/list.html',
            'user-referee': '../user/referee.html',
            'user-referee-logs': '../user/referee-logs.html',
            'order-list': '../order/list.html',
            'order-refund': '../order/refund.html',
            'withdraw-audit': '../order/withdraw-audit.html',
            'mall-goods': '../order/mall-goods.html',
            'course-list': '../course/list.html',
            'schedule-list': '../course/schedule.html',
            'appointment-list': '../course/appointment.html',
            'case-list': '../course/case.html',
            'material-list': '../course/material.html',
            'ambassador-list': '../ambassador/list.html',
            'application-audit': '../ambassador/application-audit.html',
            'activity-list': '../ambassador/activity.html',
            'contract-list': '../ambassador/contract.html',
            'admin-list': '../system/admin.html',
            'config': '../system/config.html',
            'announcement-list': '../system/announcement.html',
            'feedback-list': '../system/feedback.html',
            'notification-list': '../system/notification.html',
            'level-config': '../system/level-config.html',
          };
          
          if (routes[value]) {
            window.location.href = routes[value];
          }
        };
        
        
        const loading = ref(false);
        const courses = ref([]);
        const searchForm = reactive({
          keyword: '',
          type: '',
          status: ''
        });
        
        const pagination = reactive({
          current: 1,
          pageSize: CONFIG.PAGE_SIZE,
          total: 0
        });

        const editDialogVisible = ref(false);
        const editMode = ref('add');
        const editFormRef = ref(null);
        // editForm 所有字段使用 camelCase，云函数负责转换为 snake_case
        const editForm = reactive({
          id: null,
          name: '',
          nickname: '',
          type: null,
          coverImage: '',      // 云存储 fileID，提交给云函数
          coverImageURL: '',   // 临时 URL，仅用于显示预览
          currentPrice: 0,
          originalPrice: 0,
          retrainPrice: 0,
          // courses.validity_days：必填正整数，单位：天
          validityDays: 365,
          duration: '',
          description: '',
          content: '',
          outline: '',
          teacher: '',
          sortOrder: 0,
          status: 0,
          needContract: 1,
          enableGiftCourse: false,  // 赠送课程开关（仅密训班）
          includedCourseId: null    // 赠送课程ID（单选）
        });
        const isCourseLocked = ref(false);        // 课程已上架时锁定编辑
        const publishedCourseOptions = ref([]);   // 上架课程列表（供赠送课程下拉选择）


        // 表格列配置
        const columns = [
          { colKey: 'id', title: 'ID', width: 80 },
          { colKey: 'cover_image', title: '课程图片', width: 100 },
          { colKey: 'name', title: '课程名称', width: 150 },
          { colKey: 'nickname', title: '课程昵称', width: 120 },
          { colKey: 'type', title: '课程类型', width: 100 },
          { colKey: 'current_price', title: '现价（元）', width: 100 },
          { colKey: 'original_price', title: '原价（元）', width: 100 },
          { colKey: 'duration', title: '课程时长', width: 100 },
          { colKey: 'validity_days', title: '有效期', width: 100 },
          { colKey: 'sold_count', title: '已售', width: 80 },
          { colKey: 'sort_order', title: '排序', width: 80 },
          { colKey: 'status', title: '状态', width: 80 },
          { colKey: 'created_at', title: '创建时间', width: 160 },
          { colKey: 'operation', title: '操作', width: 250, fixed: 'right' }
        ];

        // 获取课程列表
        const fetchCourses = async () => {
          loading.value = true;
          try {
            const params = {
              page: pagination.current,
              pageSize: pagination.pageSize,
              ...searchForm
            };

            const data = await AdminAPI.getCourseList(params);
            courses.value = data.list || [];
            pagination.total = data.total || 0;
          } catch (error) {
            console.error('获取课程列表失败:', error);
            TDesign.MessagePlugin.error('获取课程列表失败: ' + error.message);
          } finally {
            loading.value = false;
          }
        };

        // 搜索
        const handleSearch = () => {
          pagination.current = 1;
          fetchCourses();
        };

        // 重置
        const handleReset = () => {
          Object.assign(searchForm, {
            keyword: '',
            type: '',
            status: ''
          });
          handleSearch();
        };

        // 分页变化
        const handlePageChange = (pageInfo) => {
          pagination.current = pageInfo.current;
          pagination.pageSize = pageInfo.pageSize;
          fetchCourses();
        };

        // 加载所有课程列表（供赠送课程下拉选择，排除自身；不限状态，方便管理员提前配置）
        const loadPublishedCourses = async (excludeId) => {
          try {
            const data = await AdminAPI.getCourseList({ pageSize: 100 });
            publishedCourseOptions.value = (data.list || []).filter(c => c.id !== excludeId);
          } catch (e) {
            console.warn('加载课程列表失败', e);
          }
        };

        // 显示新增对话框（新课程默认下架 status=0）
        const showAddDialog = () => {
          editMode.value = 'add';
          isCourseLocked.value = false;
          Object.assign(editForm, {
            id: null,
            name: '',
            nickname: '',
            type: null,
            coverImage: '',
            coverImageURL: '',
            currentPrice: 0,
            originalPrice: 0,
            retrainPrice: 0,
            validityDays: null,
            duration: '',
            description: '',
            content: '',
            outline: '',
            teacher: '',
            sortOrder: 0,
            status: 0,
            needContract: 1,
            enableGiftCourse: false,
            includedCourseId: null
          });
          loadPublishedCourses(null);
          editDialogVisible.value = true;
        };

        // 编辑课程
        const editCourse = async (course) => {
          editMode.value = 'edit';
          isCourseLocked.value = course.status === 1;
          const vd = course.validity_days != null ? parseInt(course.validity_days) : null;

          // 解析 included_course_ids（DB 存 JSON 字符串 如 "[3]"）
          let giftId = null;
          try {
            const ids = course.included_course_ids
              ? (typeof course.included_course_ids === 'string' ? JSON.parse(course.included_course_ids) : course.included_course_ids)
              : [];
            giftId = ids.length > 0 ? ids[0] : null;
          } catch (e) { /* ignore */ }

          Object.assign(editForm, {
            id: course.id,
            name: course.name,
            nickname: course.nickname || '',
            type: course.type,
            coverImage: course.cover_image || '',
            coverImageURL: '',
            originalPrice: course.original_price,
            currentPrice: course.current_price,
            retrainPrice: course.retrain_price,
            validityDays: vd,
            duration: course.duration,
            description: course.description,
            content: course.content,
            outline: (() => {
              // DB 存 JSON 数组字符串，展示时转为每行一条
              try {
                const arr = course.outline
                  ? (typeof course.outline === 'string' ? JSON.parse(course.outline) : course.outline)
                  : [];
                return Array.isArray(arr) ? arr.join('\n') : (course.outline || '');
              } catch (e) { return course.outline || ''; }
            })(),
            teacher: course.teacher,
            sortOrder: course.sort_order,
            status: course.status,
            needContract: course.need_contract ?? 1,
            enableGiftCourse: !!giftId,
            includedCourseId: giftId
          });
          // 将 fileID 转为临时 URL 用于预览
          if (course.cover_image) {
            try {
              editForm.coverImageURL = await window.CloudStorageHelper.getSingleTempURL(course.cover_image);
            } catch (e) { console.warn('获取封面临时URL失败', e); }
          }
          await loadPublishedCourses(course.id);
          editDialogVisible.value = true;
        };

        // 保存课程，所有参数使用 camelCase，云函数负责转换
        const handleSave = async () => {
          if (isCourseLocked.value) {
            TDesign.MessagePlugin.warning('课程已上架，不可修改。如需修改请先下架。');
            return;
          }
          try {
            const isSalon = editForm.type === 4;
            // 非沙龙课程有效期为必填
            if (!isSalon && (!editForm.validityDays || Number(editForm.validityDays) <= 0)) {
              TDesign.MessagePlugin.error('课程有效期为必填项，请输入大于 0 的天数');
              return;
            }
            const params = {
              name: editForm.name,
              nickname: editForm.nickname,
              type: editForm.type,
              coverImage: editForm.coverImage,
              currentPrice: isSalon ? 0 : editForm.currentPrice,
              originalPrice: isSalon ? 0 : editForm.originalPrice,
              retrainPrice: isSalon ? 0 : editForm.retrainPrice,
              validityDays: isSalon ? null : editForm.validityDays,
              duration: isSalon ? null : editForm.duration,
              description: editForm.description,
              content: editForm.content,
              // 多行文本 → JSON 数组字符串存入 DB
              outline: JSON.stringify(
                (editForm.outline || '').split('\n').map(s => s.trim()).filter(s => s)
              ),
              teacher: editForm.teacher,
              sortOrder: editForm.sortOrder,
              status: editForm.status,
              needContract: isSalon ? 0 : editForm.needContract,
              includedCourseIds: (editForm.type === 2 && editForm.enableGiftCourse && editForm.includedCourseId)
                ? editForm.includedCourseId
                : null
            };

            if (editMode.value === 'add') {
              await AdminAPI.createCourse(params);
              TDesign.MessagePlugin.success('课程创建成功');
            } else {
              params.id = editForm.id;
              await AdminAPI.updateCourse(params);
              TDesign.MessagePlugin.success('课程更新成功');
            }

            editDialogVisible.value = false;
            fetchCourses();
          } catch (error) {
            TDesign.MessagePlugin.error('保存失败: ' + error.message);
          }
        };

        // 切换状态（下架→上架时弹出确认框）
        const toggleStatus = (course) => {
          const newStatus = course.status === 1 ? 0 : 1;
          const doToggle = async () => {
            try {
              await AdminAPI.updateCourse({ id: course.id, status: newStatus });
              TDesign.MessagePlugin.success('状态更新成功');
              fetchCourses();
            } catch (error) {
              TDesign.MessagePlugin.error('状态更新失败: ' + error.message);
            }
          };
          if (newStatus === 1) {
            const dialog = TDesign.DialogPlugin.confirm({
              header: '确认上架',
              body: '课程上架后不能修改任何字段，确定好再上架。',
              confirmBtn: '确认上架',
              cancelBtn: '取消',
              onConfirm: async () => {
                dialog.update({ confirmBtn: { loading: true } });
                await doToggle();
                dialog.hide();
              },
              onCancel: () => dialog.hide(),
              onClose: () => dialog.hide(),
            });
          } else {
            doToggle();
          }
        };

        // 删除课程（二次确认后软删除，课程从列表中消失）
        const deleteCourse = (course) => {
          const dialog = TDesign.DialogPlugin.confirm({
            header: '确认删除',
            body: `确定要删除课程「${course.name}」吗？删除后课程将不再显示，历史订单数据不受影响。`,
            confirmBtn: { content: '确认删除', theme: 'danger' },
            cancelBtn: '取消',
            onConfirm: async () => {
              dialog.update({ confirmBtn: { loading: true } });
              try {
                await AdminAPI.deleteCourse({ id: course.id });
                TDesign.MessagePlugin.success('课程删除成功');
                fetchCourses();
              } catch (error) {
                TDesign.MessagePlugin.error('删除失败: ' + error.message);
              } finally {
                dialog.hide();
              }
            },
            onCancel: () => dialog.hide(),
            onClose: () => dialog.hide(),
          });
        };

        // 获取类型文本（DB type 为整数）
        const getTypeText = (type) => {
          const typeMap = { 1: '初探班', 2: '密训班', 3: '咨询服务', 4: '沙龙' };
          return typeMap[type] || String(type);
        };

        // 获取类型样式类（DB type 为整数）
        const getTypeClass = (type) => {
          const classMap = { 1: 'type-initial', 2: 'type-intensive', 3: 'type-consultation', 4: 'type-salon' };
          return classMap[type] || '';
        };

        // ── 课程学习服务协议弹窗逻辑 ──
        const contractDialogVisible = ref(false);
        const contractLoading = ref(false);
        const contractSaving = ref(false);
        const contractUploading = ref(false);
        const contractCourseRow = ref(null);
        const contractForm = ref({
          contract_name: '',
          contract_file_id: null,
          contract_file_url: null,
          contract_file_name: null,
          validity_years: 1,
          template_id: null,
          isNew: false
        });
        const contractFileInput = ref(null);

        const openCourseContract = async (row) => {
          contractCourseRow.value = row;
          contractDialogVisible.value = true;
          contractLoading.value = true;
          // 合同期限由课程有效期换算：validity_days / 365，四舍五入，最小 1 年
          const courseValidityYears = Math.max(1, Math.round((row.validity_days || 365) / 365));
          try {
            const res = await AdminAPI.getContractTemplateByCourse(row.id);
            if (res.template) {
              contractForm.value = {
                contract_name: res.template.contract_name || '',
                contract_file_id: res.template.contract_file_id || null,
                contract_file_url: res.template.contract_file_url || null,
                contract_file_name: res.template.contract_file_id
                  ? res.template.contract_file_id.split('/').pop()
                  : null,
                // 始终以课程有效期为准，忽略模板中存储的旧值
                validity_years: courseValidityYears,
                template_id: res.template.id,
                isNew: false
              };
            } else {
              contractForm.value = {
                contract_name: `${row.name}学习服务协议`,
                contract_file_id: null,
                contract_file_url: null,
                contract_file_name: null,
                validity_years: courseValidityYears,
                template_id: null,
                isNew: true
              };
            }
          } catch (e) {
            TDesign.MessagePlugin.error('加载协议失败: ' + e.message);
          } finally {
            contractLoading.value = false;
          }
        };

        const triggerContractFileInput = () => contractFileInput.value && contractFileInput.value.click();

        const handleContractFileChange = async (e) => {
          const file = e.target.files[0];
          e.target.value = '';
          if (!file) return;
          const ext = file.name.split('.').pop().toLowerCase();
          if (!['pdf', 'doc', 'docx'].includes(ext)) {
            TDesign.MessagePlugin.warning('仅支持 PDF / Word 格式文件');
            return;
          }
          contractUploading.value = true;
          TDesign.MessagePlugin.loading('电子合同上传中，请稍候…', 0);
          try {
            const courseId = contractCourseRow.value ? contractCourseRow.value.id : 'unknown';
            const cloudPath = `contracts/courses/${courseId}/${Date.now()}.${ext}`;
            const result = await CloudStorageHelper.uploadSingleFile(file, cloudPath);
            contractForm.value.contract_file_id = result.fileID;
            contractForm.value.contract_file_name = file.name;
            contractForm.value.contract_file_url = result.tempFileURL || result.fileID;
            TDesign.MessagePlugin.closeAll();
            TDesign.MessagePlugin.success('文件上传成功');
          } catch (err) {
            TDesign.MessagePlugin.closeAll();
            TDesign.MessagePlugin.error('文件上传失败：' + (err.message || '未知错误'));
          } finally {
            contractUploading.value = false;
          }
        };

        const previewContractFile = () => {
          if (contractForm.value.contract_file_url) {
            window.open(contractForm.value.contract_file_url, '_blank');
          }
        };

        const saveContract = async () => {
          if (!contractForm.value.contract_name) {
            TDesign.MessagePlugin.warning('请输入协议名称');
            return;
          }
          if (contractForm.value.isNew && !contractForm.value.contract_file_id) {
            TDesign.MessagePlugin.warning('请先选择并上传电子合同文件（PDF 或 Word）');
            return;
          }
          contractSaving.value = true;
          try {
            const fileId = contractForm.value.contract_file_id;
            if (contractForm.value.isNew) {
              await AdminAPI.createCourseContractTemplate({
                contract_name: contractForm.value.contract_name,
                courseId: contractCourseRow.value.id,
                contractFileId: fileId,
                validityYears: contractForm.value.validity_years || 1
              });
              contractForm.value.isNew = false;
            } else {
              await AdminAPI.updateCourseContractTemplate({
                template_id: contractForm.value.template_id,
                contract_name: contractForm.value.contract_name,
                contractFileId: fileId,
                validityYears: contractForm.value.validity_years || 1
              });
            }
            TDesign.MessagePlugin.success('协议保存成功');
            contractDialogVisible.value = false;
          } catch (e) {
            TDesign.MessagePlugin.error('保存失败: ' + e.message);
          } finally {
            contractSaving.value = false;
          }
        };

        onMounted(() => {
          if (checkAuth()) {
          fetchCourses();
        }
        });

        return {
          activeMenuKey: 'course-list',adminInfo,
          handleLogout,
          handleMenuChange,
          loading,
          courses,
          searchForm,
          pagination,
          columns,
          editDialogVisible,
          editMode,
          editFormRef,
          editForm,
          isCourseLocked,
          publishedCourseOptions,
          handleSearch,
          handleReset,
          handlePageChange,
          showAddDialog,
          editCourse,
          handleSave,
          toggleStatus,
          deleteCourse,
          getTypeText,
          getTypeClass,
          contractDialogVisible,
          contractLoading,
          contractSaving,
          contractUploading,
          contractCourseRow,
          contractForm,
          contractFileInput,
          openCourseContract,
          triggerContractFileInput,
          handleContractFileChange,
          previewContractFile,
          saveContract,
          };
      }
    }).use(TDesign)
      .component('sidebar-menu', SidebarNavigation.SidebarMenu)
      .component('cloud-image-upload', CloudUploadComponents.CloudImageUpload)
      .mount('#app');
  </script>
</body>
</html>
