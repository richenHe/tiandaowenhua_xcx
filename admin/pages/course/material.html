<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
  <link rel="icon" href="data:,"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>素材管理</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><link rel="stylesheet" href="../../assets/css/tokens.css"><style>body{margin:0;padding:20px;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.page-container{max-width:1400px;margin:0 auto;background:white;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.page-header{margin-bottom:24px}.page-title{font-size:20px;font-weight:600;color:#333;margin:0 0 8px 0}.page-desc{font-size:14px;color:#999;margin:0}.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .upload-placeholder{width:200px;height:160px;border:2px dashed #dcdcdc;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;}
    .upload-placeholder:hover{border-color:#0052d9;background:#f3f3f3;}
    .image-preview{position:relative;width:200px;}
    .image-preview img{width:100%;height:160px;object-fit:cover;border-radius:4px;border:1px solid #dcdcdc;}
    .image-actions{margin-top:8px;display:flex;gap:8px;}
    .upload-tips{margin-top:6px;font-size:12px;color:#999;}
    .video-preview{width:100%;}
    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }

  </style></head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="material-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="page-container"><div class="page-header"><h1 class="page-title">素材管理</h1><p class="page-desc">管理朋友圈推广素材（海报、文案、视频）</p></div><t-form layout="inline" style="margin-bottom:20px;background:white;padding:16px;border-radius:8px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;"><t-form-item><t-input v-model="filters.keyword" placeholder="素材名称" clearable style="width:200px;"/></t-form-item><t-form-item><t-select v-model="filters.category" :options="typeOptions" placeholder="素材分类" clearable style="width:150px;"/></t-form-item><t-form-item><t-space><t-button theme="primary" @click="handleSearch">查询</t-button><t-button theme="default" @click="handleReset">重置</t-button><t-button theme="success" @click="handleAdd">上传素材</t-button></t-space></t-form-item></t-form><t-table :data="tableData" :columns="columns" :loading="loading" :pagination="pagination" @page-change="handlePageChange" row-key="id" bordered stripe hover><template #type="{ row }"><t-tag v-if="row.category==='poster'" theme="primary">海报</t-tag><t-tag v-else-if="row.category==='copywriting'" theme="success">文案</t-tag><t-tag v-else-if="row.category==='video'" theme="warning">视频</t-tag><t-tag v-else theme="default">{{ row.category }}</t-tag></template><template #fileSize="{ row }"><span>{{ row.file_size != null ? (row.file_size / (1024 * 1024)).toFixed(2) + ' MB' : '-' }}</span></template><template #operation="{ row }"><t-space size="small"><t-button theme="primary" size="small" variant="text" @click="handleDownload(row)">下载</t-button><t-button theme="default" size="small" variant="text" @click="handleEdit(row)">编辑</t-button><t-button theme="danger" size="small" variant="text" @click="handleDelete(row)">删除</t-button></t-space></template></t-table></div><t-dialog v-model:visible="formVisible" :header="formMode==='add'?'上传素材':'编辑素材'" width="650px" @confirm="handleSubmit">
  <t-form ref="form" :data="formData" :rules="rules" label-width="100px">
    <t-form-item label="素材名称" name="title"><t-input v-model="formData.title" placeholder="请输入素材名称"/></t-form-item>
    <t-form-item label="素材分类" name="category"><t-select v-model="formData.category" :options="typeOptions" placeholder="选择分类"/></t-form-item>

    <!-- 图片上传 - 云存储 image_url -->
    <t-form-item label="素材图片" name="imageUrl">
      <cloud-image-upload
        v-model="formData.imageUrlDisplay"
        v-model:file-id="formData.imageUrl"
        path-prefix="materials/images"
        :item-id="formData.id || 'new'"
        tips="支持 JPG/PNG/GIF，不超过 5MB"
        :width="280"
        :height="160"
      />
    </t-form-item>

    <!-- 视频上传 - 云存储 video_url -->
    <t-form-item label="视频资料" name="videoUrl">
      <input type="file" ref="videoFileInput" accept="video/*" @change="handleVideoChange" style="display:none;">
      <div v-if="!formData.videoUrl" class="upload-placeholder" @click="triggerVideoUpload">
        <t-icon name="video" style="font-size:32px;color:#999;margin-bottom:8px;"/><p style="margin:0;color:#999;font-size:14px;">点击上传视频</p>
      </div>
      <div v-else class="video-preview">
        <video :src="formData.videoUrlDisplay || formData.videoUrl" controls style="width:100%;max-height:180px;border-radius:4px;"></video>
        <div class="image-actions">
          <t-button size="small" variant="outline" @click="triggerVideoUpload" :loading="videoUploading">更换视频</t-button>
          <t-button size="small" theme="danger" variant="outline" @click="removeVideo">删除</t-button>
        </div>
      </div>
      <p class="upload-tips">支持 MP4/MOV，不超过 1GB</p>
    </t-form-item>

    <t-form-item label="资料内容" name="content"><t-textarea v-model="formData.content" placeholder="资料文字内容" :maxlength="5000" :autosize="{minRows:3,maxRows:6}"/></t-form-item>
    <t-form-item label="排序" name="sortOrder"><t-input-number v-model="formData.sortOrder" :min="0" style="width:100%;"/></t-form-item>
    <t-form-item label="显示状态" name="status">
      <t-radio-group v-model="formData.status"><t-radio :value="1">显示</t-radio><t-radio :value="0">隐藏</t-radio></t-radio-group>
    </t-form-item>
  </t-form>
</t-dialog>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <script src="../../assets/js/config.js?v=20260227"></script>
  <script src="../../assets/js/cloudbase.js?v=20260227"></script>
  <script src="../../assets/js/cloud-storage-helper.js"></script>
  <script src="../../assets/js/admin-api.js?v=20260227f"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260227ddc"></script>
  
  <script>
    const { createApp, ref, onMounted } = Vue;
    
    createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        
        const loading = ref(false);
        const tableData = ref([]);
        const formVisible = ref(false);
        const formMode = ref('add');
        const formData = ref({});
        const filters = ref({ keyword: '', category: null });

        // 视频上传
        const videoFileInput = ref(null);
        const videoUploading = ref(false);
        // 素材分类（与小程序端保持一致）
        const typeOptions = [
          { label: '海报', value: 'poster' },
          { label: '文案', value: 'copywriting' },
          { label: '视频', value: 'video' }
        ];
        const pagination = ref({ current: 1, pageSize: 20, total: 0 });
        
        const columns = [
          { colKey: 'title', title: '素材名称', width: 250 },
          // DB 返回 category 字段（原 type）
          { colKey: 'category', title: '分类', width: 100, cell: 'type' },
          { colKey: 'file_size', title: '文件大小', width: 100, cell: 'fileSize' },
          { colKey: 'download_count', title: '下载次数', width: 100 },
          { colKey: 'created_at', title: '上传时间', width: 160 },
          { colKey: 'operation', title: '操作', width: 180, fixed: 'right', cell: 'operation' }
        ];
        
        // 表单验证规则，name 与表单字段 camelCase 保持一致
        const rules = {
          title: [{ required: true, message: '请输入素材名称', type: 'error' }],
          category: [{ required: true, message: '请选择素材分类', type: 'error' }]
        };
        
        const fetchData = async () => {
          loading.value = true;
          try {
            const params = {
              page: pagination.value.current,
              pageSize: pagination.value.pageSize,
              ...filters.value
            };
            const data = await AdminAPI.getMaterialList(params);
            tableData.value = data.list;
            pagination.value.total = data.total;
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '获取数据失败');
          } finally {
            loading.value = false;
          }
        };
        
        
        const handleSearch = () => {
          pagination.value.current = 1;
          fetchData();
        };
        
        const handleReset = () => {
          filters.value = { keyword: '', category: null };
          handleSearch();
        };
        
        const handlePageChange = (pageInfo) => {
          pagination.value.current = pageInfo.current;
          pagination.value.pageSize = pageInfo.pageSize;
          fetchData();
        };
        
        // 视频上传
        const triggerVideoUpload = () => videoFileInput.value && videoFileInput.value.click();
        const handleVideoChange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const valid = CloudStorageHelper.validateFile(file, {
            maxSize: 1024 * 1024 * 1024,
            acceptTypes: ['video/mp4', 'video/quicktime', 'video/x-msvideo', 'video/*']
          });
          if (!valid.valid) { TDesign.MessagePlugin.error(valid.error); return; }
          videoUploading.value = true;
          TDesign.MessagePlugin.loading('视频上传中，请稍候...', 0);
          try {
            const cloudPath = CloudStorageHelper.generateCloudPath(
              'academy/materials/videos',
              formData.value.id || 'new',
              file.name
            );
            const result = await CloudStorageHelper.uploadSingleFile(file, cloudPath);
            formData.value.videoUrl = result.fileID;
            formData.value.videoUrlDisplay = result.tempFileURL;
            TDesign.MessagePlugin.closeAll();
            TDesign.MessagePlugin.success('视频上传成功');
          } catch (error) {
            TDesign.MessagePlugin.closeAll();
            TDesign.MessagePlugin.error('视频上传失败：' + error.message);
          } finally {
            videoUploading.value = false;
            e.target.value = '';
          }
        };
        const removeVideo = () => { formData.value.videoUrl = ''; formData.value.videoUrlDisplay = ''; };

        const handleAdd = () => {
          formMode.value = 'add';
          formData.value = { imageUrl: '', imageUrlDisplay: '', videoUrl: '', videoUrlDisplay: '' };
          formVisible.value = true;
        };
        
        const handleEdit = async (row) => {
          formMode.value = 'edit';
          formData.value = {
            id: row.id,
            title: row.title,
            category: row.category,
            imageUrl: row.image_url || '',
            imageUrlDisplay: '',
            videoUrl: row.video_url || '',
            videoUrlDisplay: '',
            content: row.content,
            sortOrder: row.sort_order,
            status: row.status
          };
          // getMaterialList 云函数已在服务端转换 URL，直接使用即可
          formData.value.imageUrlDisplay = row.image_url || '';
          formData.value.videoUrlDisplay = row.video_url || '';
          formVisible.value = true;
        };
        
        const handleDelete = async (row) => {
          try {
            await AdminAPI.deleteMaterial({ materialId: row.id });
            TDesign.MessagePlugin.success('删除成功');
            fetchData();
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '删除失败');
          }
        };
        
        const handleDownload = (row) => {
          const url = row.video_url || row.image_url;
          if (url) {
            window.open(url, '_blank');
          } else {
            TDesign.MessagePlugin.warning('该素材暂无可下载文件');
          }
        };
        
        const handleSubmit = async () => {
          try {
            const payload = { ...formData.value };
            delete payload.imageUrlDisplay;
            delete payload.videoUrlDisplay;
            if (formMode.value === 'add') {
              await AdminAPI.createMaterial(payload);
            } else {
              await AdminAPI.updateMaterial(payload);
            }
            TDesign.MessagePlugin.success('保存成功');
            formVisible.value = false;
            fetchData();
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '保存失败');
          }
        };
        
        onMounted(() => {
          fetchData();
        });
        
        return {
          activeMenuKey: 'material-list',// 侧边栏导航
          adminInfo,
          handleMenuChange,
          handleLogout,
          // 页面功能
          loading,
          tableData,
          formVisible,
          formMode,
          formData,
          filters,
          typeOptions,
          pagination,
          columns,
          rules,
          handleSearch,
          handleReset,
          handlePageChange,
          handleAdd,
          handleEdit,
          handleDelete,
          handleDownload,
          handleSubmit,
          // 视频上传
          videoFileInput,
          videoUploading,
          triggerVideoUpload,
          handleVideoChange,
          removeVideo
        };
      }
    }).use(TDesign)
      .component('sidebar-menu', SidebarNavigation.SidebarMenu)
      .component('cloud-image-upload', CloudUploadComponents.CloudImageUpload)
      .mount('#app');
  </script>
</body>
</html>
