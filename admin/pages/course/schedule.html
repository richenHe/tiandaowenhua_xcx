<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排期管理</title>
  <link rel="stylesheet" href="../../assets/libs/tdesign.min.css">
  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <style>
    body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .page-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .page-header { margin-bottom: 24px; }
    .page-title { font-size: 20px; font-weight: 600; color: #333; margin: 0 0 8px 0; }
    .page-desc { font-size: 14px; color: #999; margin: 0; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  
    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }

  </style>
</head>
<body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="schedule-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content">
    <div class="page-container">
      <div class="page-header">
        <h1 class="page-title">排期管理</h1>
        <p class="page-desc">管理课程排期，设置上课时间和地点</p>
      </div>

      <t-form layout="inline" style="margin-bottom: 20px; background: white; padding: 16px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;">
        <t-form-item label="选择课程">
          <t-select v-model="filters.courseId" :options="courseOptions" placeholder="全部课程" clearable style="width: 200px;" />
        </t-form-item>
        <t-form-item label="上课时间">
          <t-date-range-picker v-model="filters.dateRange" clearable placeholder="选择日期范围" style="width: 280px;" />
        </t-form-item>
        <t-form-item label="状态">
          <t-select v-model="filters.status" :options="statusOptions" placeholder="全部" clearable style="width: 150px;" />
        </t-form-item>
        <t-form-item>
          <t-space>
            <t-button theme="primary" @click="handleSearch"><template #icon><t-icon name="search" /></template>查询</t-button>
            <t-button theme="default" @click="handleReset"><template #icon><t-icon name="refresh" /></template>重置</t-button>
            <t-button theme="success" @click="handleAdd"><template #icon><t-icon name="add" /></template>新增排期</t-button>
          </t-space>
        </t-form-item>
      </t-form>

      <t-table :data="tableData" :columns="columns" :loading="loading" :pagination="pagination" @page-change="handlePageChange" row-key="id" bordered stripe hover>
        <template #status="{ row }">
          <t-tag v-if="row.status === 1" theme="success">未开始</t-tag>
          <t-tag v-else-if="row.status === 2" theme="primary">进行中</t-tag>
          <t-tag v-else-if="row.status === 3" theme="default">已结束</t-tag>
          <t-tag v-else theme="warning">已取消</t-tag>
        </template>
        <template #operation="{ row }">
          <t-space size="small">
            <t-button theme="primary" size="small" variant="text" @click="handleEdit(row)">编辑</t-button>
            <t-button v-if="row.status !== 0" theme="default" size="small" variant="text" @click="handleGenerateQRCode(row)">生成签到码</t-button>
            <t-button theme="default" size="small" variant="text" @click="handleShowQRCodeList(row)">签到码</t-button>
            <t-button v-if="row.status !== 0" theme="warning" size="small" variant="text" @click="handleCancel(row)">取消</t-button>
            <t-button v-else theme="default" size="small" variant="text" disabled>已取消</t-button>
          </t-space>
        </template>
      </t-table>
    </div>

    <t-dialog v-model:visible="formVisible" :header="formMode === 'add' ? '新增排期' : '编辑排期'" width="600px" @confirm="handleSubmit">
      <t-form ref="form" :data="formData" :rules="rules" label-width="100px">
        <!-- 所有字段使用 camelCase，云函数负责转换为 snake_case 存入 DB -->
        <t-form-item label="课程" name="courseId">
          <t-select v-model="formData.courseId" :options="courseOptions" placeholder="选择课程" />
        </t-form-item>
        <t-form-item label="上课日期" name="classDate">
          <t-date-picker v-model="formData.classDate" clearable style="width: 100%;" placeholder="开课日期" />
        </t-form-item>
        <t-form-item label="结课日期" name="classEndDate">
          <t-date-picker v-model="formData.classEndDate" clearable style="width: 100%;" placeholder="结课日期（多天课程时填写）" />
        </t-form-item>
        <t-form-item label="上课时段" name="classTime">
          <t-input v-model="formData.classTime" placeholder="如 09:00-17:00" />
        </t-form-item>
        <t-form-item label="上课地点" name="classLocation">
          <t-input v-model="formData.classLocation" placeholder="请输入上课地点" />
        </t-form-item>
        <t-form-item label="总名额" name="totalQuota">
          <t-input-number v-model="formData.totalQuota" :min="1" :max="100" style="width: 100%;" />
        </t-form-item>
        <t-form-item label="备注" name="remark">
          <t-textarea v-model="formData.remark" placeholder="选填" :maxlength="200" />
        </t-form-item>
      </t-form>
    </t-dialog>

    <!-- 生成签到码结果弹窗 -->
    <t-dialog v-model:visible="qrPreviewVisible" header="签到二维码" width="400px" :footer="false">
      <div style="text-align: center; padding: 16px 0;">
        <div v-if="qrGenerating" style="padding: 40px 0;">
          <t-loading text="正在生成签到码..." />
        </div>
        <template v-else-if="qrPreviewUrl">
          <img :src="qrPreviewUrl" alt="签到二维码" style="width: 260px; height: 260px; border: 1px solid #eee; border-radius: 8px;" />
          <p style="margin: 12px 0 4px; font-size: 14px; color: #333;">{{ qrPreviewInfo.course_name }}</p>
          <p style="margin: 0; font-size: 13px; color: #999;">上课日期：{{ qrPreviewInfo.class_date }}</p>
          <p style="margin: 8px 0 0; font-size: 12px; color: #bbb;">学生使用微信扫描此码即可完成签到</p>
        </template>
      </div>
    </t-dialog>

    <!-- 签到码列表弹窗 -->
    <t-dialog v-model:visible="qrListVisible" header="签到码管理" width="700px" :footer="false">
      <div style="margin-bottom: 12px; color: #666; font-size: 13px;">
        排期：{{ qrListInfo.course_name }} ({{ qrListInfo.class_date }})
      </div>
      <t-table :data="qrListData" :columns="qrListColumns" :loading="qrListLoading" row-key="id" bordered stripe hover size="small">
        <template #qrcode_url="{ row }">
          <img :src="row.qrcode_url" alt="二维码" style="width: 60px; height: 60px; cursor: pointer; border: 1px solid #eee; border-radius: 4px;" @click="previewQRImage(row.qrcode_url)" />
        </template>
        <template #status="{ row }">
          <t-tag v-if="row.status === 1" theme="success" size="small">有效</t-tag>
          <t-tag v-else theme="default" size="small">已禁用</t-tag>
        </template>
        <template #op="{ row }">
          <t-popconfirm content="确定删除此签到码？" @confirm="handleDeleteQRCode(row)">
            <t-button theme="danger" size="small" variant="text">删除</t-button>
          </t-popconfirm>
        </template>
      </t-table>
    </t-dialog>

    <!-- 签到码大图预览 -->
    <t-dialog v-model:visible="qrImagePreviewVisible" header="签到码预览" width="420px" :footer="false">
      <div style="text-align: center;">
        <img :src="qrImagePreviewUrl" alt="签到二维码" style="max-width: 360px; max-height: 360px;" />
      </div>
    </t-dialog>
          </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/js/config.js?v=20260228"></script>
  <script src="../../assets/js/admin-api.js?v=20260228"></script>
  <script src="../../assets/js/sidebar-navigation.js?v=20260228"></script>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        // 管理员信息
        const adminInfo = ref(null);
        
        // 检查登录状态
        const checkAuth = () => {
          adminInfo.value = AdminAPI.getCurrentAdmin();
          if (!adminInfo.value) {
            window.location.href = '../../index.html';
            return false;
          }
          return true;
        };
        
        // 退出登录
        const handleLogout = () => {
          AdminAPI.logout();
        };
        
        // 菜单切换
        const handleMenuChange = (value) => {
          const routes = {
            'dashboard': '../../dashboard.html',
            'user-list': '../user/list.html',
            'user-referee': '../user/referee.html',
            'user-referee-logs': '../user/referee-logs.html',
            'order-list': '../order/list.html',
            'order-refund': '../order/refund.html',
            'withdraw-audit': '../order/withdraw-audit.html',
            'mall-goods': '../order/mall-goods.html',
            'course-list': '../course/list.html',
            'schedule-list': '../course/schedule.html',
            'appointment-list': '../course/appointment.html',
            'case-list': '../course/case.html',
            'material-list': '../course/material.html',
            'ambassador-list': '../ambassador/list.html',
            'application-audit': '../ambassador/application-audit.html',
            'activity-list': '../ambassador/activity.html',
            'contract-list': '../ambassador/contract.html',
            'admin-list': '../system/admin.html',
            'config': '../system/config.html',
            'announcement-list': '../system/announcement.html',
            'feedback-list': '../system/feedback.html',
            'notification-list': '../system/notification.html',
            'level-config': '../system/level-config.html',
          };
          
          if (routes[value]) {
            window.location.href = routes[value];
          }
        };
        
        
        const loading = ref(false);
        const tableData = ref([]);
        const formVisible = ref(false);
        const formMode = ref('add');
        const formData = ref({});
        const filters = ref({ courseId: null, dateRange: [], status: null });
        const courseOptions = ref([]);
        // class_records.status: 0已取消/1未开始/2进行中/3已结束
        const statusOptions = [
          { label: '未开始', value: 1 },
          { label: '进行中', value: 2 },
          { label: '已结束', value: 3 },
          { label: '已取消', value: 0 }
        ];
        const pagination = ref({ current: 1, pageSize: 20, total: 0 });
        const columns = [
          { colKey: 'id', title: 'ID', width: 80 },
          { colKey: 'course_name', title: '课程名称', width: 200 },
          { colKey: 'class_date', title: '上课日期', width: 120 },
          { colKey: 'class_end_date', title: '结课日期', width: 120 },
          { colKey: 'class_time', title: '上课时段', width: 120 },
          { colKey: 'class_location', title: '上课地点', ellipsis: true },
          { colKey: 'booked_quota', title: '已预约', width: 100 },
          { colKey: 'total_quota', title: '总名额', width: 100 },
          { colKey: 'status', title: '状态', width: 100, cell: 'status' },
          { colKey: 'operation', title: '操作', width: 280, fixed: 'right', cell: 'operation' }
        ];
        // 表单验证规则，name 与表单字段 camelCase 保持一致
        const rules = {
          courseId: [{ required: true, message: '请选择课程', type: 'error' }],
          classDate: [{ required: true, message: '请选择上课日期', type: 'error' }],
          classLocation: [{ required: true, message: '请输入上课地点', type: 'error' }],
          totalQuota: [{ required: true, message: '请输入总名额', type: 'error' }]
        };

        const fetchData = async () => {
          loading.value = true;
          try {
            const params = { page: pagination.value.current, pageSize: pagination.value.pageSize, ...filters.value };
            const data = await AdminAPI.getScheduleList(params);
            tableData.value = data.list;
            pagination.value.total = data.total;
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '获取数据失败');
          } finally {
            loading.value = false;
          }
        };

        const fetchCourses = async () => {
          try {
            const data = await AdminAPI.getAllCourses();
            courseOptions.value = data.map(c => ({ label: c.name, value: c.id }));
          } catch (error) {
            console.error('获取课程列表失败', error);
          }
        };

        const handleSearch = () => { pagination.value.current = 1; fetchData(); };
        const handleReset = () => { filters.value = { courseId: null, dateRange: [], status: null }; handleSearch(); };
        const handlePageChange = (pageInfo) => { pagination.value.current = pageInfo.current; pagination.value.pageSize = pageInfo.pageSize; fetchData(); };
        const handleAdd = () => { formMode.value = 'add'; formData.value = { totalQuota: 30, classTime: '' }; formVisible.value = true; };
        const handleEdit = (row) => {
          formMode.value = 'edit';
          formData.value = {
            id: row.id,
            courseId: row.course_id,
            classDate: row.class_date,
            classEndDate: row.class_end_date || '',
            classTime: row.class_time || '',
            classLocation: row.class_location,
            totalQuota: row.total_quota,
            remark: row.remark,
            teacher: row.teacher,
            status: row.status
          };
          formVisible.value = true;
        };
        const handleCancel = (row) => {
          TDesign.DialogPlugin.confirm({
            header: '取消排期',
            body: `确定要取消「${row.course_name || '该排期'}」（${row.class_date}）吗？取消后学员将无法预约。`,
            confirmBtn: { content: '确定取消', theme: 'danger' },
            cancelBtn: '我再想想',
            onConfirm: async ({ e, trigger }) => {
              try {
                await AdminAPI.updateSchedule({ id: row.id, status: 0 });
                TDesign.MessagePlugin.success('已取消');
                fetchData();
              } catch (error) {
                TDesign.MessagePlugin.error(error.message || '操作失败');
              }
            }
          });
        };
        const handleSubmit = async () => {
          try {
            if (formMode.value === 'add') {
              await AdminAPI.createSchedule(formData.value);
            } else {
              await AdminAPI.updateSchedule(formData.value);
            }
            TDesign.MessagePlugin.success('保存成功');
            formVisible.value = false;
            fetchData();
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '保存失败');
          }
        };

        // ========== 签到码功能 ==========
        const qrPreviewVisible = ref(false);
        const qrGenerating = ref(false);
        const qrPreviewUrl = ref('');
        const qrPreviewInfo = ref({});

        const qrListVisible = ref(false);
        const qrListLoading = ref(false);
        const qrListData = ref([]);
        const qrListInfo = ref({});
        const qrListColumns = [
          { colKey: 'id', title: 'ID', width: 60 },
          { colKey: 'qrcode_url', title: '二维码', width: 80, cell: 'qrcode_url' },
          { colKey: 'scene', title: 'Scene', width: 100 },
          { colKey: 'status', title: '状态', width: 80, cell: 'status' },
          { colKey: 'created_at', title: '创建时间', width: 170 },
          { colKey: 'op', title: '操作', width: 80, cell: 'op' }
        ];

        const qrImagePreviewVisible = ref(false);
        const qrImagePreviewUrl = ref('');

        const handleGenerateQRCode = async (row) => {
          qrPreviewInfo.value = { course_name: row.course_name, class_date: row.class_date };
          qrPreviewUrl.value = '';
          qrGenerating.value = true;
          qrPreviewVisible.value = true;
          try {
            const data = await AdminAPI.generateCheckinQRCode({ classRecordId: row.id });
            qrPreviewUrl.value = data.qrcode_url;
            qrPreviewInfo.value = { course_name: data.course_name || row.course_name, class_date: data.class_date || row.class_date };
            TDesign.MessagePlugin.success('签到码生成成功');
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '生成签到码失败');
            qrPreviewVisible.value = false;
          } finally {
            qrGenerating.value = false;
          }
        };

        const handleShowQRCodeList = async (row) => {
          qrListInfo.value = { course_name: row.course_name || '', class_date: row.class_date || '' };
          qrListData.value = [];
          qrListLoading.value = true;
          qrListVisible.value = true;
          try {
            const data = await AdminAPI.getCheckinQRCodeList({ classRecordId: row.id, pageSize: 50 });
            qrListData.value = data.list || [];
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '获取签到码列表失败');
          } finally {
            qrListLoading.value = false;
          }
        };

        const handleDeleteQRCode = async (row) => {
          try {
            await AdminAPI.deleteCheckinQRCode({ id: row.id });
            TDesign.MessagePlugin.success('删除成功');
            qrListData.value = qrListData.value.filter(item => item.id !== row.id);
          } catch (error) {
            TDesign.MessagePlugin.error(error.message || '删除失败');
          }
        };

        const previewQRImage = (url) => {
          qrImagePreviewUrl.value = url;
          qrImagePreviewVisible.value = true;
        };

        onMounted(() => {
          if (checkAuth()) { fetchData(); fetchCourses(); }
        });

        return {
          activeMenuKey: 'schedule-list', adminInfo,
          handleLogout, handleMenuChange,
          loading, tableData, formVisible, formMode, formData, filters, courseOptions, statusOptions, pagination, columns, rules,
          handleSearch, handleReset, handlePageChange, handleAdd, handleEdit, handleCancel, handleSubmit,
          qrPreviewVisible, qrGenerating, qrPreviewUrl, qrPreviewInfo,
          qrListVisible, qrListLoading, qrListData, qrListInfo, qrListColumns,
          qrImagePreviewVisible, qrImagePreviewUrl,
          handleGenerateQRCode, handleShowQRCodeList, handleDeleteQRCode, previewQRImage
        };
      }
    }).use(TDesign).component('sidebar-menu', SidebarNavigation.SidebarMenu).mount('#app');
  </script>
</body>
</html>
