<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>活动管理</title><link rel="stylesheet" href="../../assets/libs/tdesign.min.css"><style>body{margin:0;padding:20px;background:#f5f5f5}.container{max-width:1400px;margin:0 auto;background:white;border-radius:8px;padding:24px}.header{margin-bottom:24px}.title{font-size:20px;font-weight:600;margin-bottom:8px}.desc{color:#999;margin-bottom:24px}.bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    /* TDesign 布局样式 - 必需！*/
    .t-layout {
      height: 100vh;
    }
    
    .t-layout__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dcdcdc;
    }
    
    .t-layout__sider {
      background: #fff;
      border-right: 1px solid #dcdcdc;
      width: 240px !important;
      flex-shrink: 0;
    }
    
    .t-layout__content {
      padding: 24px;
      overflow-y: auto;
      background: #f5f5f5;
    }
    .multi-upload-container{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;}
    .thumb-item{position:relative;width:88px;height:88px;border-radius:4px;overflow:hidden;border:1px solid #dcdcdc;}
    .thumb-item img{width:100%;height:100%;object-fit:cover;}
    .thumb-remove{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;font-size:12px;line-height:1;}
    .add-image-btn{width:88px;height:88px;border:2px dashed #dcdcdc;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#999;font-size:12px;gap:4px;}
    .add-image-btn:hover{border-color:#0052d9;color:#0052d9;}
    .upload-tips{font-size:12px;color:#999;margin-top:4px;}
  </style></head><body>
  <div id="app">
    <t-layout style="height: 100vh;">
      <!-- 顶部导航 -->
      <t-header height="64px" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        background: #fff;
        border-bottom: 1px solid #dcdcdc;
      ">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 18px; font-weight: 600; color: #333;">🎨 天道文化后台管理</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span>{{ adminInfo?.real_name || adminInfo?.username || '管理员' }}</span>
          <t-button size="small" @click="handleLogout">退出</t-button>
        </div>
      </t-header>
      
      <t-layout>
        <!-- 侧边菜单 -->
        <sidebar-menu active-key="activity-list"></sidebar-menu>
        
        <!-- 主内容区 -->
        <t-content class="page-content"><div class="container"><div class="header" style="display:flex;justify-content:space-between;align-items:flex-start;"><div><h1 class="title">活动管理</h1><p class="desc">管理大使线下活动</p></div><t-button theme="success" @click="add">+ 创建活动</t-button></div><div class="bar"><div style="width:200px;flex:0 0 200px;"><t-input v-model="q" placeholder="活动名称" clearable /></div><t-button theme="primary" @click="load">查询</t-button><t-button @click="reset">重置</t-button></div><t-table :data="list" :columns="cols" :loading="loading" :pagination="page" @page-change="changePage" bordered stripe><template #status="{row}"><t-tag v-if="row.status===1" theme="success">进行中</t-tag><t-tag v-else-if="row.status===2">已结束</t-tag><t-tag v-else theme="warning">未开始</t-tag></template><template #op="{row}"><t-space><t-button size="small" variant="text" @click="edit(row)">编辑</t-button><t-button size="small" variant="text" theme="danger" @click="del(row)">删除</t-button></t-space></template></t-table></div><t-dialog v-model:visible="show" :header="mode==='add'?'创建活动':'编辑活动'" width="620px" @confirm="save">
  <t-form :data="form" label-width="100px">
    <t-form-item label="活动名称"><t-input v-model="form.name"/></t-form-item>
    <t-form-item label="活动时间"><t-date-range-picker v-model="form.dateRange"/></t-form-item>
    <t-form-item label="活动地点"><t-input v-model="form.location"/></t-form-item>
    <t-form-item label="活动描述"><t-textarea v-model="form.description" :autosize="{minRows:4}"/></t-form-item>
    <!-- 活动图片多图上传 - 云存储 images 字段 -->
    <t-form-item label="活动图片">
      <input type="file" ref="imagesFileInput" accept="image/*" multiple @change="handleImagesChange" style="display:none;">
      <div class="multi-upload-container">
        <div v-for="(img, idx) in form.imagesPreviews" :key="idx" class="thumb-item">
          <img :src="img.url" :alt="'图片'+(idx+1)">
          <span class="thumb-remove" @click="removeImageItem(idx)">×</span>
        </div>
        <div class="add-image-btn" @click="triggerImagesUpload" v-if="!imagesUploading">
          <t-icon name="add" style="font-size:20px;"/>
          <span>添加图片</span>
        </div>
        <div v-else class="add-image-btn"><t-loading size="small"/></div>
      </div>
      <p class="upload-tips">支持 JPG/PNG，每张不超过 5MB，可多选</p>
    </t-form-item>
  </t-form>
</t-dialog>        </t-content>
      </t-layout>
    </t-layout>
  </div>

  <script src="../../assets/libs/vue.global.js"></script>
  <script src="../../assets/libs/tdesign.min.js"></script>
  <script src="../../assets/libs/cloudbase.full.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/cloudbase.js"></script>
  <script src="../../assets/js/cloud-storage-helper.js"></script>
  <script src="../../assets/js/admin-api.js"></script>
  <script src="../../assets/js/sidebar-navigation.js"></script><script>const{createApp,ref,onMounted}=Vue;createApp({
      setup() {
        // 引入侧边栏导航功能
        const { adminInfo, handleMenuChange, handleLogout } = SidebarNavigation.useSidebarNavigation();
        const loading = ref(false);
        const list = ref([]);
        const show = ref(false);
        const mode = ref('add');
        const form = ref({});
        const q = ref('');
        const page = ref({ current: 1, pageSize: 20, total: 0 });
        const cols = [
          { colKey: 'name', title: '活动名称', width: 200 },
          { colKey: 'location', title: '地点', width: 150 },
          { colKey: 'start_date', title: '开始时间', width: 120 },
          { colKey: 'end_date', title: '结束时间', width: 120 },
          { colKey: 'participant_count', title: '参与人数', width: 100 },
          { colKey: 'status', title: '状态', width: 100, cell: 'status' },
          { colKey: 'op', title: '操作', width: 150, cell: 'op' }
        ];

        // 多图上传
        const imagesFileInput = ref(null);
        const imagesUploading = ref(false);
        const triggerImagesUpload = () => imagesFileInput.value && imagesFileInput.value.click();
        const handleImagesChange = async (e) => {
          const files = Array.from(e.target.files);
          if (!files.length) return;
          imagesUploading.value = true;
          try {
            for (const file of files) {
              const valid = CloudStorageHelper.validateFile(file, { maxSize: 5 * 1024 * 1024, accept: ['image/jpeg', 'image/png', 'image/gif'] });
              if (!valid.valid) { TDesign.MessagePlugin.error(file.name + ': ' + valid.message); continue; }
              const cloudPath = CloudStorageHelper.generateCloudPath('activities', file.name);
              const result = await CloudStorageHelper.uploadSingleFile(file, cloudPath);
              const tempUrl = await CloudStorageHelper.getSingleTempURL(result.fileID);
              if (!form.value.imagesPreviews) form.value.imagesPreviews = [];
              if (!form.value.images) form.value.images = [];
              form.value.imagesPreviews.push({ fileID: result.fileID, url: tempUrl });
              form.value.images.push(result.fileID);
            }
          } catch (error) {
            TDesign.MessagePlugin.error('图片上传失败：' + error.message);
          } finally {
            imagesUploading.value = false;
            e.target.value = '';
          }
        };
        const removeImageItem = (idx) => {
          form.value.imagesPreviews.splice(idx, 1);
          form.value.images.splice(idx, 1);
        };

        const load = async () => {
          loading.value = true;
          try {
            const data = await AdminAPI.getAmbassadorActivityList({ page: page.value.current, pageSize: page.value.pageSize, keyword: q.value });
            list.value = data.list;
            page.value.total = data.total;
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
          finally { loading.value = false; }
        };
        const reset = () => { q.value = ''; load(); };
        const changePage = pi => { page.value.current = pi.current; page.value.pageSize = pi.pageSize; load(); };

        const add = () => {
          mode.value = 'add';
          form.value = { dateRange: [], images: [], imagesPreviews: [] };
          show.value = true;
        };

        const edit = async (row) => {
          mode.value = 'edit';
          form.value = { ...row, dateRange: row.dateRange || [], images: [], imagesPreviews: [] };
          // 解析 images 字段（JSON 数组字符串或数组）
          let imgIDs = [];
          if (row.images) {
            try { imgIDs = typeof row.images === 'string' ? JSON.parse(row.images) : row.images; } catch { imgIDs = []; }
          }
          form.value.images = Array.isArray(imgIDs) ? [...imgIDs] : [];
          show.value = true;
          // 异步获取临时 URL
          if (form.value.images.length > 0) {
            try {
              const urls = await CloudStorageHelper.getBatchTempURLs(form.value.images);
              form.value.imagesPreviews = form.value.images.map(id => ({ fileID: id, url: urls[id] || '' }));
            } catch (e) { console.error('获取图片预览失败', e); }
          }
        };

        const del = async (row) => {
          const ok = await TDesign.DialogPlugin.confirm({ header: '确认删除', body: '确认删除该活动吗？' });
          if (!ok) return;
          try {
            await AdminAPI.deleteAmbassadorActivity({ activityId: row.id });
            TDesign.MessagePlugin.success('删除成功'); load();
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        const save = async () => {
          try {
            const payload = { ...form.value };
            delete payload.imagesPreviews;
            if (mode.value === 'add') await AdminAPI.createAmbassadorActivity(payload);
            else await AdminAPI.updateAmbassadorActivity(payload);
            TDesign.MessagePlugin.success('保存成功');
            show.value = false; load();
          } catch (e) { TDesign.MessagePlugin.error(e.message); }
        };

        onMounted(load);
        return {
          activeMenuKey: 'activity-list',adminInfo, handleMenuChange, handleLogout,
          loading, list, show, mode, form, q, page, cols,
          load, reset, changePage, add, edit, del, save,
          imagesFileInput, imagesUploading, triggerImagesUpload, handleImagesChange, removeImageItem
        };}}).use(TDesign).component('sidebar-menu', SidebarNavigation.SidebarMenu).mount('#app');</script></body></html>
